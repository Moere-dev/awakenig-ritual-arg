<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁</text></svg>">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #000;
            color: #b0b0b0;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* CRT effect */
        .crt::before {
            content: '';
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            pointer-events: none;
            z-index: 1001;
            background: radial-gradient(
                ellipse at center,
                transparent 60%,
                rgba(0,0,0,0.35) 80%,
                rgba(0,0,0,0.75) 100%
            );
        }
        .crt::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1002;
            box-shadow:
                inset 0 0 80px rgba(0,0,0,0.6),
                inset 0 0 160px rgba(0,0,0,0.3);
            border-radius: 18px;
        }

        .audio-toggle { z-index: 1500; }

        .terminal-wrap {
            flex: 1;
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 25px 120px;
            position: relative;
            z-index: 1;
        }

        .line {
            margin-bottom: 2px;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            line-height: 1.5;
        }
        .line.dim { color: rgba(0, 255, 65, 0.2); }
        .line.green { color: #00ff41; text-shadow: 0 0 5px rgba(0,255,65,0.3); }
        .line.amber { color: #d4a030; text-shadow: 0 0 5px rgba(212,160,48,0.2); }
        .line.red { color: #ff4444; text-shadow: 0 0 5px rgba(255,68,68,0.2); }
        .line.white { color: #e0e0e0; }
        .line.success { color: #00ff41; text-shadow: 0 0 8px rgba(0,255,65,0.4); }

        .input-line {
            display: none;
            margin-top: 6px;
            font-family: 'VT323', monospace;
            font-size: 1rem;
        }
        .input-line .prompt {
            color: #00ff41;
            text-shadow: 0 0 5px rgba(0,255,65,0.3);
        }
        .input-line input {
            background: transparent;
            border: none;
            outline: none;
            color: #00ff41;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            letter-spacing: 1px;
            caret-color: #00ff41;
            width: calc(100% - 120px);
        }
        .input-line input::placeholder { color: rgba(0,255,65,0.15); }

        /* Fragment unlock section */
        .fragment-section {
            display: none;
            margin-top: 20px;
            padding: 15px 20px;
            border: 1px solid rgba(0, 255, 65, 0.15);
            background: rgba(0, 20, 0, 0.3);
        }
        .fragment-section.active { display: block; }
        .frag-prompt-text {
            color: #d4a030;
            font-size: 0.95rem;
            margin-bottom: 10px;
            text-shadow: 0 0 5px rgba(212,160,48,0.2);
        }
        .frag-input-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .frag-input-wrap .fprompt {
            color: #00ff41;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .frag-input-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #00ff41;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            letter-spacing: 2px;
            caret-color: #00ff41;
        }
        .frag-input-wrap input::placeholder { color: rgba(0,255,65,0.15); }
        .frag-error {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .frag-error.visible { opacity: 1; }
        .frag-success {
            color: #00ff41;
            font-size: 0.95rem;
            margin-top: 8px;
            text-shadow: 0 0 8px rgba(0,255,65,0.4);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .frag-success.visible { opacity: 1; }

        /* Boot cursor blink */
        .boot-cursor { animation: blink-cursor 0.6s steps(2) infinite; }
        @keyframes blink-cursor { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* Status bar */
        .status-bar {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            height: 28px;
            background: rgba(0, 10, 0, 0.9);
            border-top: 1px solid rgba(0, 255, 65, 0.08);
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 0.7rem;
            color: rgba(0, 255, 65, 0.25);
            z-index: 100;
        }
        .status-bar .sb-left { flex: 1; overflow: hidden; white-space: nowrap; }
        .status-bar .sb-right { text-align: right; white-space: nowrap; }

        @media (max-width: 600px) {
            .terminal-wrap { padding: 15px 12px 100px; }
            body { font-size: 0.95rem; }
            .crt::after { border-radius: 10px; }
        }
    </style>
</head>
<body>
    <div class="crt crt-on">
        <div class="scanlines"></div>
        <div class="flicker-line"></div>

        <div class="terminal-wrap" id="terminal"></div>

        <div class="input-line" id="input-line">
            <span class="prompt">user@localhost:~$ </span><input type="text" id="cmd-input" autocomplete="off" spellcheck="false" placeholder="">
        </div>

        <div class="status-bar">
            <div class="sb-left" id="sb-msg"></div>
            <div class="sb-right" id="sb-clock"></div>
        </div>
    </div>

    <script src="sfx.js"></script>
    <script src="atmosphere.js"></script>
    <script src="audio-toggle.js"></script>

    <script>
        // ============================================================
        //  INIT
        // ============================================================
        AudioToggle.init();
        ATMO.init({ drone: true, crackle: true });

        var terminal = document.getElementById('terminal');
        var inputLine = document.getElementById('input-line');
        var cmdInput = document.getElementById('cmd-input');
        var breachWon = localStorage.getItem('arg-breach-won') === 'true';
        var breachFailed = localStorage.getItem('arg-breach-failed') === 'true';
        var fragmentUnlocked = localStorage.getItem('arg-fragment0-unlocked') === 'true';

        var CODE_HASH = '7fd491e56c28b1fc38860045f3c26a2b32adf92a004ee4bdca9b01bd6ea487ff';

        // ============================================================
        //  HELPERS
        // ============================================================
        function addLine(text, cls) {
            var d = document.createElement('div');
            d.className = 'line' + (cls ? ' ' + cls : '');
            d.textContent = text;
            terminal.appendChild(d);
            scrollBottom();
        }
        function addLineHtml(html, cls) {
            var d = document.createElement('div');
            d.className = 'line' + (cls ? ' ' + cls : '');
            d.innerHTML = html;
            terminal.appendChild(d);
            scrollBottom();
        }
        function addEmpty() { addLine('', ''); }
        function scrollBottom() { window.scrollTo(0, document.body.scrollHeight); }

        // ============================================================
        //  SFX
        // ============================================================
        var SFX = {
            keyPress: SFXCore.keyPress,
            boot: function() { SFXCore.tone('square', 800, 0.08, 0.04); },
            confirm: function() {
                SFXCore.tone('sine', 600, 0.15, 0.05);
                setTimeout(function() { SFXCore.tone('sine', 900, 0.15, 0.05); }, 100);
            },
            error: function() { SFXCore.tone('square', 150, 0.15, 0.04); },
            unlock: function() {
                [600, 800, 1000, 1200].forEach(function(f, i) {
                    setTimeout(function() { SFXCore.tone('sine', f, 0.2, 0.06); }, i * 100);
                });
            }
        };

        // ============================================================
        //  BOOT SEQUENCE
        // ============================================================
        var bootLines = [
            { text: 'BIOS v3.1.7 — Initialisiere...', cls: 'dim', delay: 0 },
            { text: 'Speichertest: 640K OK', cls: 'dim', delay: 300 },
            { text: 'Festplatte: /dev/seele0 .......... [ONLINE]', cls: 'dim', delay: 200 },
            { text: 'Netzwerk: TUNNEL-4A ............. [VERBUNDEN]', cls: 'dim', delay: 200 },
            { text: '', cls: '', delay: 400 },
            { text: '███████████████████████████████████████', cls: 'green', delay: 100 },
            { text: '█                                     █', cls: 'green', delay: 50 },
            { text: '█   FORSCHER-TERMINAL v1.0            █', cls: 'green', delay: 50 },
            { text: '█   Sicherer Zugang zum Signalnetz    █', cls: 'green', delay: 50 },
            { text: '█                                     █', cls: 'green', delay: 50 },
            { text: '███████████████████████████████████████', cls: 'green', delay: 100 },
            { text: '', cls: '', delay: 400 },
            { text: 'System bereit.', cls: 'green', delay: 300 },
        ];

        function runBoot(index) {
            if (index >= bootLines.length) {
                showHelp();
                return;
            }
            var line = bootLines[index];
            setTimeout(function() {
                if (line.text !== '') SFX.boot();
                addLine(line.text, line.cls);
                runBoot(index + 1);
            }, line.delay);
        }

        // ============================================================
        //  HELP & COMMANDS
        // ============================================================
        function showHelp() {
            addEmpty();
            addLine('Verfügbare Befehle:', 'amber');
            addLine('  open übertragung    — Signalübertragung öffnen', 'white');

            if (breachFailed && !breachWon) {
                addLine('  reconnect seele     — Zurück zum Seelenreich-Terminal', 'white');
            }
            if (breachWon && !fragmentUnlocked) {
                addLine('  decrypt fragment    — Gefundenen Code entschlüsseln', 'white');
            }
            if (fragmentUnlocked) {
                addLine('  open fragment       — Forscher-Fragment #0 öffnen', 'white');
            }

            addLine('  help                — Befehle anzeigen', 'white');
            addLine('  clear               — Terminal leeren', 'white');
            addEmpty();

            // Show input
            inputLine.style.display = 'block';
            cmdInput.focus();
        }

        // ============================================================
        //  COMMAND PROCESSING
        // ============================================================
        cmdInput.addEventListener('keydown', function(e) {
            if (e.key.length === 1) SFX.keyPress();
            if (e.key === 'Enter') {
                var raw = cmdInput.value.trim();
                cmdInput.value = '';
                if (!raw) return;

                addLine('user@localhost:~$ ' + raw, 'white');
                processCommand(raw);
            }
        });

        function processCommand(raw) {
            var cmd = raw.toLowerCase().trim();

            if (cmd === 'open übertragung' || cmd === 'open uebertragung' || cmd === 'open index.html' || cmd === 'open übertragung') {
                SFX.confirm();
                addLine('[SYSTEM] Verbinde mit Signalübertragung...', 'green');
                addLine('[SYSTEM] Tunnel aufgebaut. Weiterleitung...', 'green');
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 1200);
            }
            else if (cmd === 'reconnect seele' || cmd === 'reconnect seelenreich') {
                if (!breachFailed || breachWon) {
                    SFX.error();
                    addLine('[FEHLER] Befehl nicht verfügbar.', 'red');
                    return;
                }
                SFX.confirm();
                addLine('[SYSTEM] Wiederverbindung zum Seelenreich-Terminal...', 'amber');
                addLine('[SYSTEM] Vorherige Sitzung wird geladen...', 'amber');
                addLine('[WARNUNG] Eindringling noch aktiv — Vorbereiten...', 'red');
                setTimeout(function() {
                    localStorage.removeItem('arg-breach-failed');
                    window.location.href = 's33l3nreich.html?breach=retry';
                }, 2000);
            }
            else if (cmd === 'decrypt fragment' || cmd === 'decrypt fragment0') {
                if (!breachWon) {
                    SFX.error();
                    addLine('[FEHLER] Befehl nicht verfügbar.', 'red');
                    return;
                }
                if (fragmentUnlocked) {
                    addLine('[SYSTEM] Fragment bereits entschlüsselt. Nutze: open fragment', 'amber');
                    return;
                }
                SFX.confirm();
                addLine('[SYSTEM] Verschlüsseltes Fragment erkannt auf /dev/seele0', 'amber');
                addLine('[SYSTEM] Autorisierungscode erforderlich.', 'amber');
                addEmpty();
                showFragmentInput();
            }
            else if (cmd === 'open fragment' || cmd === 'open fragment0') {
                if (!fragmentUnlocked) {
                    SFX.error();
                    addLine('[FEHLER] Fragment nicht entschlüsselt.', 'red');
                    return;
                }
                SFX.confirm();
                addLine('[SYSTEM] Öffne Forscher-Fragment #0...', 'green');
                setTimeout(function() {
                    window.location.href = 'fragment0.html';
                }, 1000);
            }
            else if (cmd === 'help') {
                showHelp();
            }
            else if (cmd === 'clear') {
                terminal.innerHTML = '';
            }
            else {
                SFX.error();
                addLine('[FEHLER] Unbekannter Befehl: ' + raw, 'red');
                addLine('Tippe "help" für verfügbare Befehle.', 'dim');
            }
        }

        // ============================================================
        //  FRAGMENT UNLOCK — code input section
        // ============================================================
        function showFragmentInput() {
            inputLine.style.display = 'none';

            var section = document.createElement('div');
            section.className = 'fragment-section active';
            section.innerHTML =
                '<div class="frag-prompt-text">Gib den Autorisierungscode ein:</div>' +
                '<div class="frag-input-wrap">' +
                    '<span class="fprompt">CODE:~$ </span>' +
                    '<input type="text" id="frag-code-input" autocomplete="off" spellcheck="false" placeholder="XXXX-XX-XXXXXX">' +
                '</div>' +
                '<div class="frag-error" id="frag-error">ZUGANG VERWEIGERT — UNGÜLTIGER CODE</div>' +
                '<div class="frag-success" id="frag-success"></div>';
            terminal.appendChild(section);
            scrollBottom();

            var fragInput = document.getElementById('frag-code-input');
            var fragError = document.getElementById('frag-error');
            var fragSuccess = document.getElementById('frag-success');

            fragInput.focus();

            fragInput.addEventListener('keydown', function(e) {
                if (e.key.length === 1) SFX.keyPress();
                if (e.key === 'Enter') {
                    var val = fragInput.value.trim().toUpperCase();
                    if (!val) return;
                    verifyFragmentCode(val, fragInput, fragError, fragSuccess, section);
                }
            });
        }

        async function verifyFragmentCode(code, input, errorEl, successEl, section) {
            var encoded = new TextEncoder().encode(code);
            var hashBuf = await crypto.subtle.digest('SHA-256', encoded);
            var hashArr = Array.from(new Uint8Array(hashBuf));
            var hashHex = hashArr.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');

            if (hashHex === CODE_HASH) {
                // SUCCESS
                localStorage.setItem('arg-fragment0-unlocked', 'true');
                fragmentUnlocked = true;
                input.disabled = true;
                input.style.color = '#00ff41';
                input.style.textShadow = '0 0 10px rgba(0,255,65,0.5)';
                SFX.unlock();

                successEl.textContent = '[ENTSCHLÜSSELT] Fragment #0 verfügbar.';
                successEl.classList.add('visible');

                setTimeout(function() {
                    section.remove();
                    inputLine.style.display = 'block';
                    addEmpty();
                    addLine('[SYSTEM] FORSCHER-DATENFRAGMENT #0 — ENTSCHLÜSSELT', 'success');
                    addLine('[SYSTEM] Neuer Befehl verfügbar: open fragment', 'green');
                    addEmpty();
                    cmdInput.focus();
                }, 2000);
            } else {
                // FAIL
                SFX.error();
                errorEl.classList.add('visible');
                input.value = '';
                setTimeout(function() { errorEl.classList.remove('visible'); }, 2000);
            }
        }

        // ============================================================
        //  STATUS BAR
        // ============================================================
        (function() {
            var sbMsg = document.getElementById('sb-msg');
            var sbClock = document.getElementById('sb-clock');
            var messages = [
                'TERMINAL BEREIT',
                'VERSCHLÜSSELUNG: AES-256-GCM',
                'TUNNEL-4A: AKTIV',
                'LATENZ: ███ms',
                'PAKETSTATUS: STABIL'
            ];

            if (breachWon) {
                messages.push('PARTITION /dev/seele0: FRAGMENT ERKANNT');
            }

            var msgIdx = 0, charIdx = 0, typing = true;

            function updateClock() {
                var d = new Date();
                var h = String(d.getHours()).padStart(2, '0');
                var m = String(d.getMinutes()).padStart(2, '0');
                var s = String(d.getSeconds()).padStart(2, '0');
                sbClock.textContent = h + ':' + m + ':' + s + ' UTC±?';
            }
            setInterval(updateClock, 1000);
            updateClock();

            function tickMsg() {
                if (typing) {
                    if (charIdx <= messages[msgIdx].length) {
                        sbMsg.textContent = '> ' + messages[msgIdx].slice(0, charIdx) + (charIdx < messages[msgIdx].length ? '█' : '');
                        charIdx++;
                        setTimeout(tickMsg, 25 + Math.random() * 20);
                    } else {
                        typing = false;
                        setTimeout(tickMsg, 2500 + Math.random() * 1500);
                    }
                } else {
                    msgIdx = (msgIdx + 1) % messages.length;
                    charIdx = 0;
                    typing = true;
                    sbMsg.textContent = '> █';
                    setTimeout(tickMsg, 300);
                }
            }
            setTimeout(tickMsg, 500);
        })();

        // ============================================================
        //  BOOT
        // ============================================================
        setTimeout(function() { runBoot(0); }, 500);
    </script>
</body>
</html>
