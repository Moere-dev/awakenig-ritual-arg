<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁</text></svg>">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #000;
            color: #b0b0b0;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* CRT effect */
        .crt::before {
            content: '';
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            pointer-events: none;
            z-index: 1001;
            background: radial-gradient(
                ellipse at center,
                transparent 60%,
                rgba(0,0,0,0.35) 80%,
                rgba(0,0,0,0.75) 100%
            );
        }
        .crt::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1002;
            box-shadow:
                inset 0 0 80px rgba(0,0,0,0.6),
                inset 0 0 160px rgba(0,0,0,0.3);
            border-radius: 18px;
        }

        .audio-toggle { z-index: 1500; }

        .terminal-wrap {
            flex: 1;
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 25px 120px;
            position: relative;
            z-index: 1;
        }

        .line {
            margin-bottom: 2px;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            line-height: 1.5;
        }
        .line.dim { color: rgba(0, 255, 65, 0.2); }
        .line.green { color: #00ff41; text-shadow: 0 0 5px rgba(0,255,65,0.3); }
        .line.amber { color: #d4a030; text-shadow: 0 0 5px rgba(212,160,48,0.2); }
        .line.red { color: #ff4444; text-shadow: 0 0 5px rgba(255,68,68,0.2); }
        .line.white { color: #e0e0e0; }
        .line.success { color: #00ff41; text-shadow: 0 0 8px rgba(0,255,65,0.4); }
        .line .ok { color: #00ff41; }
        .line .warn-text { color: #d4a030; text-shadow: 0 0 5px rgba(212,160,48,0.3); }
        .line .brand {
            color: #00ff41;
            text-shadow: 0 0 10px rgba(0,255,65,0.4);
            letter-spacing: 2px;
        }
        .line .highlight { color: #00ff41; text-shadow: 0 0 8px rgba(0,255,65,0.4); }
        .line .lore-line { color: #a0a0a0; }

        .separator {
            border: none;
            border-top: 1px solid rgba(0, 255, 65, 0.12);
            margin: 6px 0;
        }



        .input-line {
            display: none;
            margin-top: 6px;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            padding: 0;
        }
        .input-line .prompt {
            color: #00ff41;
            text-shadow: 0 0 5px rgba(0,255,65,0.3);
        }
        .input-line input {
            background: transparent;
            border: none;
            outline: none;
            color: #00ff41;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            letter-spacing: 1px;
            caret-color: #00ff41;
            width: calc(100% - 120px);
        }
        .input-line input::placeholder { color: rgba(0,255,65,0.15); }

        /* Fragment unlock section */
        .fragment-section {
            display: none;
            margin-top: 20px;
            padding: 15px 20px;
            border: 1px solid rgba(0, 255, 65, 0.15);
            background: rgba(0, 20, 0, 0.3);
        }
        .fragment-section.active { display: block; }
        .frag-prompt-text {
            color: #d4a030;
            font-size: 0.95rem;
            margin-bottom: 10px;
            text-shadow: 0 0 5px rgba(212,160,48,0.2);
        }
        .frag-input-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .frag-input-wrap .fprompt {
            color: #00ff41;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .frag-input-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #00ff41;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            letter-spacing: 2px;
            caret-color: #00ff41;
        }
        .frag-input-wrap input::placeholder { color: rgba(0,255,65,0.15); }
        .frag-error {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .frag-error.visible { opacity: 1; }
        .frag-success {
            color: #00ff41;
            font-size: 0.95rem;
            margin-top: 8px;
            text-shadow: 0 0 8px rgba(0,255,65,0.4);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .frag-success.visible { opacity: 1; }

        /* ── FRAGMENT TRANSITION OVERLAY ── */
        .frag-transition {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: all;
        }
        .frag-transition.active { opacity: 1; transition: opacity 0.4s ease-in; }

        .ft-scanlines {
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,255,65,0.03) 2px,
                rgba(0,255,65,0.03) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        .ft-glitch-text {
            font-family: 'VT323', monospace;
            font-size: 1.6rem;
            color: #00ff41;
            text-shadow: 0 0 20px rgba(0,255,65,0.6);
            letter-spacing: 4px;
            z-index: 2;
            opacity: 0;
            animation: ft-appear 0.3s ease forwards;
        }
        .ft-glitch-text.delay1 { animation-delay: 0.5s; }
        .ft-glitch-text.delay2 { animation-delay: 1.2s; }
        .ft-glitch-text.delay3 { animation-delay: 1.9s; }
        .ft-glitch-text.delay4 { animation-delay: 2.6s; }

        @keyframes ft-appear {
            0%   { opacity: 0; transform: translateX(-10px); }
            60%  { opacity: 1; transform: translateX(3px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .ft-progress-wrap {
            width: 280px;
            height: 3px;
            background: rgba(0,255,65,0.1);
            margin-top: 30px;
            border-radius: 2px;
            overflow: hidden;
            z-index: 2;
            opacity: 0;
            animation: ft-appear 0.3s ease 1.0s forwards;
        }
        .ft-progress-bar {
            height: 100%;
            width: 0%;
            background: #00ff41;
            box-shadow: 0 0 8px rgba(0,255,65,0.5);
        }
        .ft-progress-bar.running {
            animation: ft-load 2.5s ease-in-out 1.3s forwards;
        }
        @keyframes ft-load {
            0%   { width: 0%; }
            20%  { width: 25%; }
            40%  { width: 38%; }
            55%  { width: 55%; }
            70%  { width: 72%; }
            85%  { width: 88%; }
            100% { width: 100%; }
        }

        .ft-hex-stream {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'VT323', monospace;
            font-size: 0.75rem;
            color: rgba(0,255,65,0.15);
            letter-spacing: 2px;
            max-width: 90vw;
            text-align: center;
            word-break: break-all;
            z-index: 2;
        }

        .ft-flash {
            position: fixed; inset: 0;
            background: #00ff41;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
        }
        .ft-flash.fire {
            animation: ft-flash-anim 0.6s ease-out forwards;
        }
        @keyframes ft-flash-anim {
            0%   { opacity: 0.8; }
            100% { opacity: 0; }
        }

        .ft-glitch-fx {
            animation: ft-glitch 0.15s steps(2) infinite;
        }
        @keyframes ft-glitch {
            0%   { transform: translate(0, 0); filter: hue-rotate(0deg); }
            25%  { transform: translate(-2px, 1px); filter: hue-rotate(90deg); }
            50%  { transform: translate(2px, -1px); filter: hue-rotate(180deg); }
            75%  { transform: translate(1px, 2px); filter: hue-rotate(270deg); }
            100% { transform: translate(-1px, -2px); filter: hue-rotate(360deg); }
        }

        /* Boot cursor blink */
        .boot-cursor { animation: blink-cursor 0.6s steps(2) infinite; }
        @keyframes blink-cursor { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* Status bar */
        .status-bar {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            height: 28px;
            background: rgba(0, 10, 0, 0.9);
            border-top: 1px solid rgba(0, 255, 65, 0.08);
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 0.7rem;
            color: rgba(0, 255, 65, 0.25);
            z-index: 100;
        }
        .status-bar .sb-left { flex: 1; overflow: hidden; white-space: nowrap; }
        .status-bar .sb-right { text-align: right; white-space: nowrap; }

        @media (max-width: 600px) {
            .terminal-wrap { padding: 15px 12px 100px; }
            body { font-size: 0.95rem; }
            .crt::after { border-radius: 10px; }
        }
    </style>
</head>
<body>
    <div class="crt crt-on">
        <div class="scanlines"></div>
        <div class="flicker-line"></div>

        <div class="terminal-wrap" id="terminal">
            <div class="input-line" id="input-line">
                <span class="prompt">user@localhost:~$ </span><input type="text" id="cmd-input" autocomplete="off" spellcheck="false" placeholder="">
            </div>
        </div>

        <button class="skip-btn" id="skip-btn">SKIP ▸</button>

        <div class="status-bar">
            <div class="sb-left" id="sb-msg"></div>
            <div class="sb-right" id="sb-clock"></div>
        </div>
    </div>

    <script src="sfx.js"></script>
    <script src="atmosphere.js"></script>
    <script src="audio-toggle.js"></script>

    <script>
        // ============================================================
        //  SESSION RESTORE — redirect to saved page
        // ============================================================
        (function() {
            var phase = localStorage.getItem('arg-phase');
            var pages = {
                'uebertragung': 'uebertragung.html',
                'aufzeichnung': 'aufzeichnung.html',
                's33l3nreich':  's33l3nreich.html',
                'fragment0':    'fragment0.html'
            };
            // Don't redirect if player just came back from breach defeat
            var breachFailed = localStorage.getItem('arg-breach-failed') === 'true';
            if (phase && pages[phase] && !breachFailed) {
                window.location.replace(pages[phase]);
                return;
            }
        })();

        // ============================================================
        //  INIT
        // ============================================================
        AudioToggle.init();
        ATMO.init({ drone: true, crackle: true });

        var terminal = document.getElementById('terminal');
        var inputLine = document.getElementById('input-line');
        var cmdInput = document.getElementById('cmd-input');
        var breachWon = localStorage.getItem('arg-breach-won') === 'true';
        var breachFailed = localStorage.getItem('arg-breach-failed') === 'true';
        var fragmentUnlocked = localStorage.getItem('arg-fragment0-unlocked') === 'true';

        var CODE_HASH = '7fd491e56c28b1fc38860045f3c26a2b32adf92a004ee4bdca9b01bd6ea487ff';

        // ============================================================
        //  HELPERS
        // ============================================================
        function addLine(text, cls) {
            var d = document.createElement('div');
            d.className = 'line' + (cls ? ' ' + cls : '');
            d.textContent = text;
            terminal.insertBefore(d, inputLine);
            scrollBottom();
        }
        function addLineHtml(html, cls) {
            var d = document.createElement('div');
            d.className = 'line' + (cls ? ' ' + cls : '');
            d.innerHTML = html;
            terminal.insertBefore(d, inputLine);
            scrollBottom();
        }
        function addEmpty() { addLine('', ''); }
        function scrollBottom() { window.scrollTo(0, document.body.scrollHeight); }

        // ============================================================
        //  SFX
        // ============================================================
        var SFX = {
            keyPress: SFXCore.keyPress,
            boot: function() { SFXCore.tone('square', 800, 0.08, 0.04); },
            confirm: function() {
                SFXCore.tone('sine', 600, 0.15, 0.05);
                setTimeout(function() { SFXCore.tone('sine', 900, 0.15, 0.05); }, 100);
            },
            error: function() { SFXCore.tone('square', 150, 0.15, 0.04); },
            unlock: function() {
                [600, 800, 1000, 1200].forEach(function(f, i) {
                    setTimeout(function() { SFXCore.tone('sine', f, 0.2, 0.06); }, i * 100);
                });
            }
        };

        // ============================================================
        //  TYPEWRITER ENGINE — char by char with cursor
        // ============================================================
        var skipped = false;
        var skipBtn = document.getElementById('skip-btn');

        function typeLine(html, speed, callback) {
            if (skipped) { addLineHtml(html, ''); if (callback) callback(); return; }
            var d = document.createElement('div');
            d.className = 'line';
            terminal.insertBefore(d, inputLine);

            var temp = document.createElement('span');
            temp.innerHTML = html;
            var plainText = temp.textContent;

            var cursor = document.createElement('span');
            cursor.textContent = '█';
            cursor.style.animation = 'blink-cursor 0.6s steps(2) infinite';
            d.appendChild(cursor);

            var charIdx = 0;
            var lastTime = 0;

            function tick(ts) {
                if (skipped) {
                    d.innerHTML = html;
                    if (callback) callback();
                    return;
                }
                if (lastTime === 0) lastTime = ts;
                if (ts - lastTime < speed) { requestAnimationFrame(tick); return; }

                if (charIdx < plainText.length) {
                    var ch = plainText[charIdx];
                    charIdx++;
                    d.insertBefore(document.createTextNode(ch), cursor);
                    if (ch !== ' ') SFX.boot();
                    lastTime = ts;
                    requestAnimationFrame(tick);
                } else {
                    d.innerHTML = html;
                    scrollBottom();
                    if (callback) callback();
                }
            }
            requestAnimationFrame(tick);
        }

        function addSep() {
            var hr = document.createElement('hr');
            hr.className = 'separator';
            terminal.insertBefore(hr, inputLine);
        }

        // ============================================================
        //  SEQUENCE RUNNER — like s33l3nreich
        // ============================================================
        function runSequence(steps, callback) {
            var i = 0;
            function next() {
                if (skipped) {
                    // instant-show remaining
                    for (var j = i; j < steps.length; j++) {
                        var s = steps[j];
                        if (s.fn) { s.fn(); }
                        else if (s.html) { addLineHtml(s.html, ''); }
                    }
                    if (callback) callback();
                    return;
                }
                if (i >= steps.length) { if (callback) callback(); return; }
                var step = steps[i];
                i++;
                setTimeout(function() {
                    if (skipped) { next(); return; }
                    if (step.fn) {
                        step.fn();
                        next();
                    } else if (step.html && step.type) {
                        typeLine(step.html, step.speed || 20, next);
                    } else if (step.html) {
                        addLineHtml(step.html, '');
                        next();
                    }
                }, step.delay || 0);
            }
            next();
        }

        // ============================================================
        //  SKIP
        // ============================================================
        skipBtn.addEventListener('click', function() {
            if (!skipped) {
                skipped = true;
                // Sequence runner will fast-forward
            }
        });

        // ============================================================
        //  BOOT SEQUENCE — typewriter style
        // ============================================================
        function startBoot() {
            setTimeout(function() {
                SFX.boot();
                var bootSteps = [
                    { html: '<span class="brand">FORSCHER-TERMINAL v1.0 — BIOS POST</span>', type: true, speed: 25, delay: 400 },
                    { fn: addSep, delay: 200 },
                    { html: 'CPU .............. Intel 486DX2-66             [<span class="ok">OK</span>]', type: true, speed: 12, delay: 200 },
                    { html: 'RAM .............. 640 KB konventionell        [<span class="ok">OK</span>]', type: true, speed: 12, delay: 180 },
                    { html: 'Festplatte ....... /dev/seele0                 [<span class="ok">ONLINE</span>]', type: true, speed: 12, delay: 200 },
                    { html: 'Netzwerk ......... TUNNEL-4A                   [<span class="ok">VERBUNDEN</span>]', type: true, speed: 12, delay: 180 },
                    { html: 'Verschlüsselung . AES-256-GCM                 [<span class="ok">AKTIV</span>]', type: true, speed: 12, delay: 200 },
                    { html: 'Signalempfänger . Seelenreich-Brücke          [<span class="warn-text">INSTABIL</span>]', type: true, speed: 12, delay: 250 },
                    { fn: addSep, delay: 200 },
                    { html: 'POST abgeschlossen. Lade Betriebssystem...', type: true, speed: 20, delay: 600 },
                    { fn: addEmpty, delay: 400 },
                    { html: 'Initialisiere Dateisystem... ████████████ OK', type: true, speed: 15, delay: 400 },
                    { html: 'Lade Signalnetz-Treiber...', type: true, speed: 20, delay: 500 },
                    { html: '<span class="ok">✓ System bereit.</span>', type: true, speed: 25, delay: 400 },
                ];

                runSequence(bootSteps, startLore);
            }, 1300);
        }

        // ============================================================
        //  LORE — atmospheric intro
        // ============================================================
        function startLore() {
            var loreSteps = [
                { fn: addEmpty, delay: 400 },
                { fn: addSep, delay: 200 },
                { html: '<span class="brand">EINGEHENDE NACHRICHT — QUELLE: UNBEKANNT</span>', type: true, speed: 25, delay: 500 },
                { fn: addSep, delay: 300 },
                { fn: addEmpty, delay: 200 },
                { html: '<span class="lore-line">Ihr habt dieses Terminal gefunden. Das ist kein Zufall.</span>', type: true, speed: 30, delay: 400 },
                { fn: addEmpty, delay: 200 },
                { html: '<span class="lore-line">Ich habe es für euch vorbereitet — eine Verbindung</span>', type: true, speed: 30, delay: 300 },
                { html: '<span class="lore-line">zu einem Ort, den niemand kennen sollte.</span>', type: true, speed: 30, delay: 400 },
                { fn: addEmpty, delay: 300 },
                { html: '<span class="lore-line">In den Dateien dieses Servers liegt eine <span class="highlight">Übertragung</span>.</span>', type: true, speed: 30, delay: 400 },
                { html: '<span class="lore-line">Öffnet sie. Folgt dem Signal. Findet, was ich hinterlassen habe.</span>', type: true, speed: 30, delay: 500 },
                { fn: addEmpty, delay: 200 },
                { html: '<span class="lore-line"><span class="warn-text">Aber seid vorsichtig. Ihr seid nicht die Einzigen, die zuhören.</span></span>', type: true, speed: 35, delay: 600 },
                { fn: addEmpty, delay: 200 },
                { fn: addSep, delay: 200 },
                { fn: addEmpty, delay: 300 },
            ];

            runSequence(loreSteps, showTerminalReady);
        }

        // ============================================================
        //  TERMINAL READY — show commands
        // ============================================================
        function showTerminalReady() {
            skipBtn.classList.add('hidden');
            addLineHtml('<span class="ok">✓ Terminal bereit.</span>', 'green');

            if (breachFailed && !breachWon) {
                showBreachFailAlert();
            } else {
                showHelp();
            }
        }

        // ============================================================
        //  BREACH FAIL ALERT — dramatic retry prompt
        // ============================================================
        function showBreachFailAlert() {
            addEmpty();
            var alertSteps = [
                { fn: addSep, delay: 300 },
                { html: '<span class="warn-text">⚠ SICHERHEITSWARNUNG — SEELENREICH-TERMINAL</span>', type: true, speed: 25, delay: 500 },
                { fn: addSep, delay: 200 },
                { fn: addEmpty, delay: 200 },
                { html: '<span style="color:#ff4444;">Letzter Verbindungsversuch: GESCHEITERT</span>', type: true, speed: 25, delay: 400 },
                { html: '<span style="color:#ff4444;">Status: EINDRINGLING HAT KONTROLLE ÜBERNOMMEN</span>', type: true, speed: 25, delay: 400 },
                { fn: addEmpty, delay: 300 },
                { html: '<span class="lore-line">Die Verteidigung wurde durchbrochen. Der Wächter hat</span>', type: true, speed: 30, delay: 300 },
                { html: '<span class="lore-line">die Verbindung gekappt — aber das Signal ist noch da.</span>', type: true, speed: 30, delay: 400 },
                { fn: addEmpty, delay: 200 },
                { html: '<span class="lore-line">Die Brücke kann wiederhergestellt werden.</span>', type: true, speed: 30, delay: 400 },
                { html: '<span class="lore-line">Aber diesmal müsst ihr schneller sein.</span>', type: true, speed: 30, delay: 500 },
                { fn: addEmpty, delay: 300 },
                { fn: addSep, delay: 200 },
                { html: '<span class="ok">» Befehl verfügbar: </span><span class="highlight">retry breach</span>', type: true, speed: 20, delay: 400 },
                { fn: addSep, delay: 200 },
                { fn: addEmpty, delay: 200 },
            ];

            runSequence(alertSteps, function() {
                inputLine.style.display = 'block';
                cmdInput.focus();
                scrollBottom();
            });
        }

        // ============================================================
        //  HELP & COMMANDS
        // ============================================================
        function showHelp() {
            addEmpty();
            addLine('Verfügbare Befehle:', 'amber');
            addLineHtml('  <span class="highlight">open übertragung</span>    — Signalübertragung öffnen', '');

            if (breachFailed && !breachWon) {
                addLineHtml('  <span class="highlight">retry breach</span>        — Hacking-Sequenz erneut starten', '');
            }
            if (breachWon) {
                addLineHtml('  <span class="highlight">decrypt fragment</span>    — Forscher-Fragment entschlüsseln', '');
            }

            addLineHtml('  <span class="highlight">help</span>                — Befehle anzeigen', '');
            addLineHtml('  <span class="highlight">clear</span>               — Terminal leeren', '');
            addEmpty();

            // Show input
            inputLine.style.display = 'block';
            cmdInput.focus();
        }

        // ============================================================
        //  COMMAND PROCESSING
        // ============================================================
        cmdInput.addEventListener('keydown', function(e) {
            if (e.key.length === 1) SFX.keyPress();
            if (e.key === 'Enter') {
                var raw = cmdInput.value.trim();
                cmdInput.value = '';
                if (!raw) return;

                addLine('user@localhost:~$ ' + raw, 'white');
                processCommand(raw);
            }
        });

        function processCommand(raw) {
            var cmd = raw.toLowerCase().trim();

            if (cmd === 'open übertragung' || cmd === 'open uebertragung') {
                SFX.confirm();
                addLine('[SYSTEM] Verbinde mit Signalübertragung...', 'green');
                addLine('[SYSTEM] Tunnel aufgebaut. Weiterleitung...', 'green');
                setTimeout(function() {
                    window.location.href = 'uebertragung.html';
                }, 1200);
            }
            else if (cmd === 'retry breach') {
                if (!breachFailed || breachWon) {
                    SFX.error();
                    addLine('[FEHLER] Befehl nicht verfügbar.', 'red');
                    return;
                }
                SFX.confirm();
                addLine('[SYSTEM] Wiederverbindung zum Seelenreich-Terminal...', 'amber');
                addLine('[SYSTEM] Vorherige Sitzung wird geladen...', 'amber');
                addLine('[WARNUNG] Eindringling noch aktiv — Vorbereiten...', 'red');
                setTimeout(function() {
                    localStorage.removeItem('arg-breach-failed');
                    window.location.href = 's33l3nreich.html?breach=retry';
                }, 2000);
            }
            else if (cmd === 'decrypt fragment' || cmd === 'decrypt fragment0') {
                if (!breachWon) {
                    SFX.error();
                    addLine('[FEHLER] Befehl nicht verfügbar.', 'red');
                    return;
                }
                if (fragmentUnlocked) {
                    SFX.confirm();
                    addLine('[SYSTEM] Fragment bereits entschlüsselt. Öffne Fragment #0...', 'green');
                    cmdInput.disabled = true;
                    setTimeout(function() { launchFragmentTransition(); }, 600);
                    return;
                }
                SFX.confirm();
                addLine('[SYSTEM] Verschlüsseltes Fragment erkannt auf /dev/seele0', 'amber');
                addLine('[SYSTEM] Autorisierungscode erforderlich.', 'amber');
                addEmpty();
                showFragmentInput();
            }
            else if (cmd === 'help') {
                showHelp();
            }
            else if (cmd === 'clear') {
                while (terminal.firstChild && terminal.firstChild !== inputLine) {
                    terminal.removeChild(terminal.firstChild);
                }
            }
            else {
                SFX.error();
                addLine('[FEHLER] Unbekannter Befehl: ' + raw, 'red');
                addLine('Tippe "help" für verfügbare Befehle.', 'dim');
            }
        }

        // ============================================================
        //  FRAGMENT UNLOCK — code input section
        // ============================================================
        function showFragmentInput() {
            inputLine.style.display = 'none';

            var section = document.createElement('div');
            section.className = 'fragment-section active';
            section.innerHTML =
                '<div class="frag-prompt-text">Gib den Autorisierungscode ein:</div>' +
                '<div class="frag-input-wrap">' +
                    '<span class="fprompt">CODE:~$ </span>' +
                    '<input type="text" id="frag-code-input" autocomplete="off" spellcheck="false" placeholder="XXXX-XX-XXXXXX">' +
                '</div>' +
                '<div class="frag-error" id="frag-error">ZUGANG VERWEIGERT — UNGÜLTIGER CODE</div>' +
                '<div class="frag-success" id="frag-success"></div>';
            terminal.insertBefore(section, inputLine);
            scrollBottom();

            var fragInput = document.getElementById('frag-code-input');
            var fragError = document.getElementById('frag-error');
            var fragSuccess = document.getElementById('frag-success');

            fragInput.focus();

            fragInput.addEventListener('keydown', function(e) {
                if (e.key.length === 1) SFX.keyPress();
                if (e.key === 'Enter') {
                    var val = fragInput.value.trim().toUpperCase();
                    if (!val) return;
                    verifyFragmentCode(val, fragInput, fragError, fragSuccess, section);
                }
            });
        }

        async function verifyFragmentCode(code, input, errorEl, successEl, section) {
            var encoded = new TextEncoder().encode(code);
            var hashBuf = await crypto.subtle.digest('SHA-256', encoded);
            var hashArr = Array.from(new Uint8Array(hashBuf));
            var hashHex = hashArr.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');

            if (hashHex === CODE_HASH) {
                // SUCCESS
                localStorage.setItem('arg-fragment0-unlocked', 'true');
                fragmentUnlocked = true;
                input.disabled = true;
                input.style.color = '#00ff41';
                input.style.textShadow = '0 0 10px rgba(0,255,65,0.5)';
                SFX.unlock();

                successEl.textContent = '[ENTSCHLÜSSELT] Fragment #0 wird geladen...';
                successEl.classList.add('visible');

                setTimeout(function() {
                    section.remove();
                    addEmpty();
                    addLine('[SYSTEM] FORSCHER-DATENFRAGMENT #0 — ENTSCHLÜSSELT', 'success');
                    addLine('[SYSTEM] Öffne Fragment #0...', 'green');
                    setTimeout(function() { launchFragmentTransition(); }, 800);
                }, 2000);
            } else {
                // FAIL
                SFX.error();
                errorEl.classList.add('visible');
                input.value = '';
                setTimeout(function() { errorEl.classList.remove('visible'); }, 2000);
            }
        }

        // ============================================================
        //  FRAGMENT TRANSITION
        // ============================================================
        function launchFragmentTransition() {
            // Build overlay
            var overlay = document.createElement('div');
            overlay.className = 'frag-transition';
            overlay.innerHTML =
                '<div class="ft-scanlines"></div>' +
                '<div class="ft-glitch-text delay1">[SEKTOR /dev/seele0]</div>' +
                '<div class="ft-glitch-text delay2">ENTSCHLÜSSELUNG ██████████ ABGESCHLOSSEN</div>' +
                '<div class="ft-glitch-text delay3">FRAGMENT #0 WIRD GELADEN...</div>' +
                '<div class="ft-progress-wrap"><div class="ft-progress-bar" id="ft-bar"></div></div>' +
                '<div class="ft-glitch-text delay4" style="font-size:0.8rem;color:rgba(0,255,65,0.3);">ZUGRIFF AUTORISIERT — FORSCHER-ARCHIV</div>' +
                '<div class="ft-hex-stream" id="ft-hex"></div>';

            var flash = document.createElement('div');
            flash.className = 'ft-flash';

            document.body.appendChild(overlay);
            document.body.appendChild(flash);

            // Activate overlay (fade in)
            requestAnimationFrame(function() {
                overlay.classList.add('active');
            });

            // SFX: breach-style whoosh
            try {
                var ctx = SFXCore.getCtx();
                var now = ctx.currentTime;
                var osc = ctx.createOscillator();
                var gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 1.5);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 2);
                osc.connect(gain).connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 2);
            } catch(e) {}

            // Start progress bar animation
            setTimeout(function() {
                var bar = document.getElementById('ft-bar');
                if (bar) bar.classList.add('running');
            }, 100);

            // Hex stream decoration
            var hexEl = document.getElementById('ft-hex');
            var hexTimer = setInterval(function() {
                var chars = '0123456789ABCDEF';
                var hex = '';
                for (var i = 0; i < 60; i++) {
                    hex += chars[Math.floor(Math.random() * 16)];
                    if (i % 8 === 7) hex += ' ';
                }
                if (hexEl) hexEl.textContent = hex;
            }, 80);

            // Glitch phase at ~3.5s
            setTimeout(function() {
                overlay.classList.add('ft-glitch-fx');
                // Stutter SFX
                try {
                    var ctx2 = SFXCore.getCtx();
                    var now2 = ctx2.currentTime;
                    var noise = ctx2.createBufferSource();
                    var buf = ctx2.createBuffer(1, ctx2.sampleRate * 0.3, ctx2.sampleRate);
                    var data = buf.getChannelData(0);
                    for (var i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.12;
                    noise.buffer = buf;
                    noise.connect(ctx2.destination);
                    noise.start(now2);
                } catch(e) {}
            }, 3500);

            // Flash + redirect at ~4.2s
            setTimeout(function() {
                clearInterval(hexTimer);
                flash.classList.add('fire');
                SFX.confirm();
                setTimeout(function() {
                    window.location.href = 'fragment0.html';
                }, 500);
            }, 4200);
        }

        // ============================================================
        //  STATUS BAR
        // ============================================================
        (function() {
            var sbMsg = document.getElementById('sb-msg');
            var sbClock = document.getElementById('sb-clock');
            var messages = [
                'TERMINAL BEREIT',
                'VERSCHLÜSSELUNG: AES-256-GCM',
                'TUNNEL-4A: AKTIV',
                'LATENZ: ███ms',
                'PAKETSTATUS: STABIL'
            ];

            if (breachWon) {
                messages.push('PARTITION /dev/seele0: FRAGMENT ERKANNT');
            }

            var msgIdx = 0, charIdx = 0, typing = true;

            function updateClock() {
                var d = new Date();
                var h = String(d.getHours()).padStart(2, '0');
                var m = String(d.getMinutes()).padStart(2, '0');
                var s = String(d.getSeconds()).padStart(2, '0');
                sbClock.textContent = h + ':' + m + ':' + s + ' UTC±?';
            }
            setInterval(updateClock, 1000);
            updateClock();

            function tickMsg() {
                if (typing) {
                    if (charIdx <= messages[msgIdx].length) {
                        sbMsg.textContent = '> ' + messages[msgIdx].slice(0, charIdx) + (charIdx < messages[msgIdx].length ? '█' : '');
                        charIdx++;
                        setTimeout(tickMsg, 25 + Math.random() * 20);
                    } else {
                        typing = false;
                        setTimeout(tickMsg, 2500 + Math.random() * 1500);
                    }
                } else {
                    msgIdx = (msgIdx + 1) % messages.length;
                    charIdx = 0;
                    typing = true;
                    sbMsg.textContent = '> █';
                    setTimeout(tickMsg, 300);
                }
            }
            setTimeout(tickMsg, 500);
        })();

        // ============================================================
        //  START
        // ============================================================
        setTimeout(function() { startBoot(); }, 500);
    </script>
</body>
</html>
