<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAS SEELENREICH</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁</text></svg>">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===================== PAGE OVERRIDES ===================== */
        body {
            background: #000;
            color: #b0b0b0;
            font-size: 1.1rem;
        }

        /* CRT curvature + vignette (page-specific barrel effect) */
        .crt::before {
            content: '';
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            pointer-events: none;
            z-index: 1001;
            background: radial-gradient(
                ellipse at center,
                transparent 60%,
                rgba(0,0,0,0.35) 80%,
                rgba(0,0,0,0.75) 100%
            );
        }

        /* CRT barrel distortion simulation */
        .crt::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1002;
            box-shadow:
                inset 0 0 80px rgba(0,0,0,0.6),
                inset 0 0 160px rgba(0,0,0,0.3);
            border-radius: 18px;
        }

        /* z-index overrides — CRT layers need higher values on this page */
        .skip-btn, .audio-toggle { z-index: 1500; }
        .audio-toggle { text-shadow: 0 0 5px rgba(0,255,65,0.3); }

        /* Horizontal flicker line */
        .flicker-line {
            position: fixed; left: 0;
            width: 100%; height: 2px;
            background: rgba(0,255,65,0.08);
            pointer-events: none; z-index: 1003;
            animation: flicker-move 6s linear infinite;
            box-shadow: 0 0 12px 2px rgba(0,255,65,0.06);
        }

        @keyframes flicker-move {
            0% { top: -2px; }
            100% { top: 100vh; }
        }

        /* ===================== CRT GLOW ===================== */
        .crt-glow {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background: radial-gradient(
                ellipse at center,
                rgba(0,255,65,0.03) 0%,
                rgba(0,255,65,0.01) 40%,
                transparent 70%
            );
            animation: glow-pulse 4s ease-in-out infinite alternate;
        }

        @keyframes glow-pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* ===================== MATRIX RAIN (canvas) ===================== */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.07;
        }

        /* ===================== TERMINAL ===================== */
        .terminal {
            max-width: 850px;
            margin: 0 auto;
            padding: 30px 25px 130px 25px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 3px rgba(0,255,65,0.15);
        }

        .terminal-line {
            margin-bottom: 2px;
            word-break: break-word;
            animation: line-appear 0.1s ease-out;
        }

        @keyframes line-appear {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===================== COLORS — GREEN + AMBER ===================== */
        .prefix { color: #00ff41; text-shadow: 0 0 6px rgba(0,255,65,0.3); }
        .text { color: #7a7a7a; }
        .ok { color: #00ff41; text-shadow: 0 0 8px rgba(0,255,65,0.4); }
        .warn-text { color: #ffaa00; text-shadow: 0 0 6px rgba(255,170,0,0.3); }
        .error-text { color: #ff4444; text-shadow: 0 0 6px rgba(255,68,68,0.3); }
        .success { color: #00ff41; text-shadow: 0 0 10px rgba(0,255,65,0.5); }
        .brand { color: #00ff41; font-size: 1.3rem; text-shadow: 0 0 12px rgba(0,255,65,0.5); }
        .dim { color: #2a2a2a; }
        .highlight { color: #00ff41; text-shadow: 0 0 8px rgba(0,255,65,0.4); }
        .warn { color: #ff4444; text-shadow: 0 0 6px rgba(255,68,68,0.3); }
        .separator { color: #1a3a1a; text-shadow: none; }

        /* Amber for lore */
        .lore-line { color: #d4a030; text-shadow: 0 0 5px rgba(212,160,48,0.25); }
        .lore-line .highlight { color: #ffcc00; text-shadow: 0 0 8px rgba(255,204,0,0.4); }
        .lore-line .warn { color: #ff4444; text-shadow: 0 0 6px rgba(255,68,68,0.3); }

        /* ===================== TYPEWRITER CURSOR ===================== */
        .tw-cursor {
            display: inline-block;
            width: 9px; height: 1.15em;
            background: #00ff41;
            vertical-align: text-bottom;
            margin-left: 1px;
            animation: cursor-blink 0.6s step-end infinite;
            box-shadow: 0 0 6px rgba(0,255,65,0.5);
        }

        @keyframes cursor-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ===================== INPUT LINE ===================== */
        .input-line {
            display: flex;
            align-items: center;
            margin-top: 6px;
        }

        .input-line .prompt {
            color: #00ff41;
            margin-right: 8px;
            white-space: nowrap;
            text-shadow: 0 0 6px rgba(0,255,65,0.3);
        }

        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: 'VT323', 'Courier New', monospace;
            font-size: 1.15rem;
            outline: none;
            caret-color: #00ff41;
            letter-spacing: 1px;
            text-shadow: 0 0 6px rgba(0,255,65,0.3);
        }

        .terminal-input::placeholder { color: #0e2e0e; text-shadow: none; }
        .terminal-input:disabled { opacity: 0.3; }

        /* ===================== STICKY NOTE ===================== */
        .sticky-note {
            position: fixed; top: 18px; right: 18px;
            width: 180px; padding: 18px 16px 14px 16px;
            background: #f5e960; color: #222;
            font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
            font-size: 0.95rem; line-height: 1.5;
            box-shadow: 3px 5px 18px rgba(0,0,0,0.7);
            transform: rotate(3deg); z-index: 1500;
            border-bottom-right-radius: 30px 8px;
            display: none;
        }
        .sticky-note.show { display: block; animation: note-drop 0.4s ease-out; }
        @keyframes note-drop {
            from { transform: rotate(3deg) translateY(-30px); opacity: 0; }
            to { transform: rotate(3deg) translateY(0); opacity: 1; }
        }
        .sticky-note::before {
            content: ''; position: absolute; top: -6px; left: 50%;
            transform: translateX(-50%); width: 50px; height: 12px;
            background: rgba(200,200,200,0.5); border-radius: 2px;
        }
        .sticky-note .note-title {
            font-weight: bold; font-size: 0.8rem; color: #555;
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;
        }
        .sticky-note .note-pw {
            font-size: 1.3rem; font-weight: bold; color: #1a1a1a;
            margin-top: 4px; letter-spacing: 2px;
        }

        /* ===================== DECRYPT DISPLAY ===================== */
        .decrypt-display {
            font-size: 2rem; letter-spacing: 6px; text-align: center;
            margin: 15px 0; padding: 20px;
            border: 1px solid #0e2e0e; background: rgba(0,10,0,0.5);
            color: #00ff41; font-family: 'VT323', monospace; min-height: 70px;
            display: none; align-items: center; justify-content: center;
            word-break: break-all;
            box-shadow: 0 0 20px rgba(0,255,65,0.05) inset;
        }
        .decrypt-display.active { display: flex; }
        .decrypt-display .char { display: inline-block; min-width: 0.6em; text-align: center; }
        .decrypt-display .char.scrambling { color: #1a4a1a; text-shadow: 0 0 3px rgba(0,255,65,0.15); }
        .decrypt-display .char.resolved {
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41, 0 0 25px rgba(0,255,65,0.4);
            animation: char-lock 0.3s ease-out;
        }
        .decrypt-display .char.dot { color: #00ff41; text-shadow: 0 0 8px rgba(0,255,65,0.3); }
        @keyframes char-lock {
            0% { transform: scale(1.4); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* ===================== PROGRESS BAR ===================== */
        .progress-bar {
            width: 100%; height: 3px; background: #0a0a0a;
            margin: 10px 0; border-radius: 2px; overflow: hidden; display: none;
            border: 1px solid #0e2e0e;
        }
        .progress-bar.active { display: block; }
        .progress-bar .fill {
            height: 100%; width: 0%; background: #00ff41;
            box-shadow: 0 0 12px #00ff41, 0 0 25px rgba(0,255,65,0.3);
            transition: width 0.3s;
        }

        /* ===================== FINAL BOX ===================== */
        .final-box {
            text-align: center; margin-top: 20px; padding: 25px;
            border: 1px solid #00ff41; background: rgba(0,255,65,0.02);
            opacity: 0; transition: opacity 1.5s ease-in;
            box-shadow: 0 0 30px rgba(0,255,65,0.05), 0 0 60px rgba(0,255,65,0.02);
        }
        .final-box.visible { opacity: 1; }
        .final-box .ip-text {
            color: #00ff41; font-size: 2rem;
            text-shadow: 0 0 15px rgba(0,255,65,0.7), 0 0 30px rgba(0,255,65,0.3);
            letter-spacing: 4px; margin: 15px 0;
        }

        /* ===================== SCREEN FLASH ===================== */
        .screen-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #00ff41; opacity: 0; pointer-events: none; z-index: 1500;
            transition: opacity 0.08s;
        }
        .screen-flash.flash { opacity: 0.12; }

        /* ===================== SHAKE ===================== */
        @keyframes shake-hard {
            0%, 100% { transform: translate(0,0); }
            10% { transform: translate(-4px,2px); }
            20% { transform: translate(4px,-2px); }
            30% { transform: translate(-3px,3px); }
            40% { transform: translate(3px,-3px); }
            50% { transform: translate(-4px,1px); }
            60% { transform: translate(2px,-4px); }
            70% { transform: translate(-2px,3px); }
            80% { transform: translate(4px,-1px); }
            90% { transform: translate(-3px,4px); }
        }
        .shaking { animation: shake-hard 0.15s linear infinite; }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 600px) {
            .terminal { padding: 15px 12px 110px 12px; }
            body { font-size: 0.95rem; }
            .sticky-note { top: auto; bottom: 50px; right: 10px; width: 155px; font-size: 0.85rem; }
            .decrypt-display { font-size: 1.3rem; letter-spacing: 3px; padding: 15px 10px; }
            .brand { font-size: 1.1rem; }
            .crt::after { border-radius: 10px; }
        }
    </style>
</head>
<body>
    <div class="crt crt-on">
        <div class="scanlines"></div>
        <div class="flicker-line"></div>
        <div class="crt-glow"></div>
        <canvas id="matrix-canvas"></canvas>
        <div class="screen-flash" id="screen-flash"></div>
        <canvas class="static-canvas" id="static-canvas" style="z-index:998;opacity:0.035;"></canvas>
        <div class="screen-tear" id="screen-tear" style="z-index:1004;"></div>
        <div class="interference-band" id="interference-band" style="height:40px;z-index:1005;"></div>

        <audio id="ambient-audio" loop preload="auto">
            <source src="ambient.mp3" type="audio/mpeg">
        </audio>
        <button class="audio-toggle" id="audio-toggle" title="Audio an/aus">SND:ON</button>
        <button class="skip-btn" id="skip-btn">[SKIP]</button>

        <div class="sticky-note" id="sticky-note">
            <div class="note-title">Passwort:</div>
            <div>Nicht vergessen!!</div>
            <div class="note-pw">Seele731</div>
        </div>

        <div class="terminal" id="terminal"></div>
    </div>

    <!-- Shared modules -->
    <script src="sfx.js"></script>
    <script src="atmosphere.js"></script>
    <script src="audio-toggle.js"></script>

    <script>
        // ============================================================
        //  CONFIG
        // ============================================================
        // Credentials stored as SHA-256 hashes (not plaintext)
        var USER_HASH = '3f8d40ad6a1d0038b8c334303fe06e70df25a1b78220855f6acc3aec951ffb3b';
        var PASS_HASH = '9d2d2de840247dea9e1be80b1fe76360c77f4672715cba7622db2551c11b6e34';
        // TARGET XOR-encrypted with password (key: seele731), revealed only after login
        var TARGET_ENC = [22,16,93,89,82,4,3,1,67,75,2,65,21,88,65,69,18,9,75,11,4,90,86];
        var TARGET = null; // resolved after successful login
        var SCRAMBLE_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*!?<>{}[]';

        var terminal = document.getElementById('terminal');
        var stickyNote = document.getElementById('sticky-note');
        var screenFlash = document.getElementById('screen-flash');

        var inputEl = null;
        var inputLineEl = null;
        var loggedIn = false;
        var decrypting = false;
        var loginAttempts = 0;
        var skipped = false;
        var skipBtn = document.getElementById('skip-btn');

        // ============================================================
        //  PAGE-SPECIFIC SFX (built on shared SFXCore)
        // ============================================================
        var SFX = {
            typeClick: SFXCore.typeClick,
            keyPress: SFXCore.keyPress,
            bootBeep: function() { SFXCore.tone('square', 800, 0.15, 0.08); },
            glitch: function() { SFXCore.noise(0.07, 0.1); },
            loginSuccess: function() {
                [600, 800, 1000].forEach(function(f, i) {
                    setTimeout(function() { SFXCore.tone('sine', f, 0.18, 0.08); }, i * 100);
                });
            },
            loginFail: function() {
                var c = SFXCore.getCtx(), o = c.createOscillator(), g = c.createGain();
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(300, c.currentTime);
                o.frequency.linearRampToValueAtTime(100, c.currentTime + 0.3);
                g.gain.setValueAtTime(0.06, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
                o.connect(g); g.connect(c.destination);
                o.start(); o.stop(c.currentTime + 0.3);
            },
            charLock: function() { SFXCore.tone('sine', 1200 + Math.random() * 400, 0.08, 0.1); },
            scrambleTick: function() { SFXCore.tone('square', 200 + Math.random() * 300, 0.015, 0.02); },
            reveal: function() {
                var c = SFXCore.getCtx();
                [200, 300, 400, 500, 600].forEach(function(freq) {
                    var o = c.createOscillator(), g = c.createGain();
                    o.type = 'sine'; o.frequency.value = freq;
                    g.gain.setValueAtTime(0.05, c.currentTime);
                    g.gain.linearRampToValueAtTime(0.07, c.currentTime + 0.5);
                    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 3);
                    o.connect(g); g.connect(c.destination);
                    o.start(); o.stop(c.currentTime + 3);
                });
            },
            warn: function() {
                var c = SFXCore.getCtx(), o = c.createOscillator(), g = c.createGain();
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(800, c.currentTime);
                o.frequency.setValueAtTime(400, c.currentTime + 0.1);
                o.frequency.setValueAtTime(800, c.currentTime + 0.2);
                o.frequency.setValueAtTime(400, c.currentTime + 0.3);
                g.gain.setValueAtTime(0.04, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.4);
                o.connect(g); g.connect(c.destination);
                o.start(); o.stop(c.currentTime + 0.4);
            }
        };

        // ============================================================
        //  CRYPTO HELPERS
        // ============================================================
        function sha256(str) {
            var enc = new TextEncoder();
            return crypto.subtle.digest('SHA-256', enc.encode(str)).then(function(buf) {
                return Array.from(new Uint8Array(buf)).map(function(b) {
                    return b.toString(16).padStart(2, '0');
                }).join('');
            });
        }

        function decryptTarget(passKey) {
            var key = passKey.toLowerCase();
            var result = '';
            for (var i = 0; i < TARGET_ENC.length; i++) {
                result += String.fromCharCode(TARGET_ENC[i] ^ key.charCodeAt(i % key.length));
            }
            return result;
        }

        // ============================================================
        //  SKIP BUTTON
        // ============================================================
        skipBtn.addEventListener('click', function() {
            if (!skipped) {
                skipped = true;
                skipBtn.classList.add('hidden');
            }
        });

        // ============================================================
        //  MATRIX RAIN (background)
        // ============================================================
        (function() {
            var canvas = document.getElementById('matrix-canvas');
            var ctx = canvas.getContext('2d');
            var w, h, columns, drops;
            var chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                columns = Math.floor(w / 16);
                drops = new Array(columns).fill(1);
            }

            resize();
            window.addEventListener('resize', resize);

            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
                ctx.fillRect(0, 0, w, h);
                ctx.fillStyle = '#00ff41';
                ctx.font = '14px VT323, monospace';

                for (var i = 0; i < drops.length; i++) {
                    var ch = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(ch, i * 16, drops[i] * 16);
                    if (drops[i] * 16 > h && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
                requestAnimationFrame(draw);
            }

            draw();
        })();

        // ============================================================
        //  INIT SHARED MODULES
        // ============================================================
        AudioToggle.init('ambient-audio', 'audio-toggle');

        ATMO.init({
            droneFreq1: 42,
            droneFreq2: 44.5,
            droneGain: 0.022,
            droneFadeIn: 5,
            lfoFreq: 0.12,
            lfoGain: 0.006,
            extraOscillators: [{ type: 'triangle', freq: 28, gain: 0.012, fadeIn: 6 }],
            crackleDelay: [3000, 10000],
            crackleDur: [0.04, 0.1],
            crackleGain: [0.012, 0.018],
            crackleBandpass: [1500, 5000],
            staticPixelChance: 0.08,
            staticAlpha: 10,
            flickerDelay: [5000, 12000],
            doubleFlickerChance: 0.4,
            doubleFlickerGap: 100,
            tearDelay: [8000, 18000],
            tearRemoval: [80, 120],
            interferenceDelay: [12000, 22000],
            interferenceHeight: [15, 50],
            interferenceRemoval: 120
        });

        // ============================================================
        //  HELPERS
        // ============================================================
        function addRaw(html) {
            var div = document.createElement('div');
            div.className = 'terminal-line';
            div.innerHTML = html;
            if (inputLineEl) terminal.insertBefore(div, inputLineEl);
            else terminal.appendChild(div);
            scrollBottom();
            return div;
        }

        function addLine(prefix, text, cls) {
            return addRaw('<span class="prefix">[' + prefix + ']</span> <span class="' + (cls||'text') + '">' + text + '</span>');
        }

        function addEmpty() { addRaw('&nbsp;'); }
        function addSep() { addRaw('<span class="separator">════════════════════════════════════════════</span>'); }

        function addEcho(cmd) {
            addRaw('<span class="prefix">forscher@seelenreich:~$</span> <span class="success">' + esc(cmd) + '</span>');
        }

        function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        function scrollBottom() { window.scrollTo(0, document.body.scrollHeight); }

        function flash() {
            SFX.glitch();
            screenFlash.classList.add('flash');
            setTimeout(function() { screenFlash.classList.remove('flash'); }, 80);
        }

        function shake() {
            document.body.classList.add('shaking');
            setTimeout(function() { document.body.classList.remove('shaking'); }, 300);
        }

        // ============================================================
        //  TYPEWRITER LINE — uses requestAnimationFrame for sync
        // ============================================================
        function typeLine(html, speed, callback) {
            if (skipped) {
                addRaw(html);
                if (callback) callback();
                return;
            }

            var temp = document.createElement('div');
            temp.innerHTML = html;
            var fullText = temp.textContent;

            var div = document.createElement('div');
            div.className = 'terminal-line';
            if (inputLineEl) terminal.insertBefore(div, inputLineEl);
            else terminal.appendChild(div);

            var cursor = document.createElement('span');
            cursor.className = 'tw-cursor';

            var charIndex = 0;
            div.innerHTML = '';
            div.appendChild(cursor);

            var lastCharTime = 0;
            var currentDelay = 0;

            function tick(timestamp) {
                if (skipped) {
                    div.innerHTML = html;
                    if (callback) callback();
                    return;
                }

                if (lastCharTime === 0) lastCharTime = timestamp;

                if (timestamp - lastCharTime < currentDelay) {
                    requestAnimationFrame(tick);
                    return;
                }

                if (charIndex < fullText.length) {
                    var ch = fullText[charIndex];
                    charIndex++;
                    var t = document.createTextNode(ch);
                    div.insertBefore(t, cursor);
                    scrollBottom();

                    if (ch !== ' ' && ch !== '\n') SFX.typeClick();

                    currentDelay = speed;
                    if (ch === ' ') currentDelay = speed * 0.3;
                    else if (ch === '.' || ch === '—') currentDelay = speed * 3;
                    else if (ch === ',') currentDelay = speed * 1.8;

                    lastCharTime = timestamp;
                    requestAnimationFrame(tick);
                } else {
                    div.innerHTML = html;
                    if (callback) callback();
                }
            }

            requestAnimationFrame(tick);
        }

        // ============================================================
        //  SEQUENCER
        // ============================================================
        function runSequence(lines, callback) {
            var i = 0;
            function next() {
                if (skipped) {
                    while (i < lines.length) {
                        var l = lines[i];
                        i++;
                        if (l.fn) l.fn();
                        else addRaw(l.html);
                    }
                    if (callback) callback();
                    return;
                }
                if (i >= lines.length) { if (callback) callback(); return; }
                var l = lines[i];
                i++;
                if (l.fn) {
                    l.fn();
                    setTimeout(next, l.delay || 200);
                } else if (l.type) {
                    typeLine(l.html, l.speed || 20, function() {
                        setTimeout(next, l.delay || 100);
                    });
                } else {
                    addRaw(l.html);
                    setTimeout(next, l.delay || 200);
                }
            }
            next();
        }

        // ============================================================
        //  BOOT SEQUENCE
        // ============================================================
        function startBoot() {
            setTimeout(function() {
                SFX.bootBeep();
                var bootLines = [
                    { html: '<span class="brand">FORSCHER-OS v0.7.3 — BIOS POST</span>', type: true, speed: 30, delay: 400 },
                    { fn: addSep, delay: 200 },
                    { html: 'CPU .............. Seelenreich Cortex M7      [<span class="ok">OK</span>]', type: true, speed: 12, delay: 200 },
                    { html: 'RAM .............. 4096 KB                     [<span class="ok">OK</span>]', type: true, speed: 12, delay: 180 },
                    { html: 'Netzwerk ......... Seelenreich-Brücke          [<span class="warn-text">INSTABIL</span>]', type: true, speed: 12, delay: 250 },
                    { html: 'Speicher ......... Fragmentiert                [<span class="warn-text">WARNUNG</span>]', type: true, speed: 12, delay: 200 },
                    { html: 'Verschlüsselung . Datenfragment erkannt        [<span class="ok">OK</span>]', type: true, speed: 12, delay: 180 },
                    { html: 'Seelen-Signatur . Forscher_Watson              [<span class="ok">GEFUNDEN</span>]', type: true, speed: 12, delay: 300 },
                    { fn: addSep, delay: 200 },
                    { html: 'POST abgeschlossen. Starte Terminal...', type: true, speed: 25, delay: 600 },
                    { fn: addEmpty, delay: 300 },
                    { html: 'Verbinde mit Seelenreich-Netzwerk...', type: true, speed: 20, delay: 800 },
                    { html: 'Tunneling durch Dimensionsriss ████████ ....', type: true, speed: 15, delay: 600 },
                    { html: 'Signalstärke: <span class="warn-text">23%</span> — Verbindung instabil', type: true, speed: 20, delay: 400 },
                    { html: 'Authentifizierungsmodul geladen.', type: true, speed: 20, delay: 300 },
                    { fn: addEmpty, delay: 200 },
                    { html: '<span class="ok">✓ Verbindung hergestellt.</span>', type: true, speed: 25, delay: 400 },
                    { fn: function() { flash(); shake(); }, delay: 400 },
                ];

                runSequence(bootLines, startLore);
            }, 1300);
        }

        // ============================================================
        //  LORE
        // ============================================================
        function startLore() {
            var loreLines = [
                { fn: addEmpty, delay: 400 },
                { fn: addSep, delay: 200 },
                { html: '<span class="brand">EINGEHENDE NACHRICHT — QUELLE: SEELENREICH</span>', type: true, speed: 25, delay: 500 },
                { fn: addSep, delay: 300 },
                { fn: addEmpty, delay: 200 },
                { html: '<span class="lore-line">Ihr habt den Code gefunden. Dann seid ihr bereit.</span>', type: true, speed: 30, delay: 400 },
                { fn: addEmpty, delay: 200 },
                { html: '<span class="lore-line">Ich sitze hier, im Seelenreich, zwischen Schatten und Stille.</span>', type: true, speed: 30, delay: 400 },
                { html: '<span class="lore-line">Einst war ich wie ihr ein Spieler.</span>', type: true, speed: 30, delay: 400 },
                { html: '<span class="lore-line">Der Fluch hat mich genommen. <span class="warn">Langsam. Gnadenlos.</span></span>', type: true, speed: 35, delay: 600 },
                { fn: addEmpty, delay: 300 },
                { html: '<span class="lore-line">Aber die verfluchte Welt existiert noch. Der Altar wartet noch.</span>', type: true, speed: 30, delay: 400 },
                { html: '<span class="lore-line">Wo ich versagt habe, könnt ihr es schaffen.</span>', type: true, speed: 30, delay: 500 },
                { fn: addEmpty, delay: 300 },
                { html: '<span class="lore-line">Mein Terminal ist noch aktiv.</span>', type: true, speed: 30, delay: 300 },
                { html: '<span class="lore-line">Meldet euch an, um die <span class="highlight">Koordinaten der verfluchten Welt</span> zu entschlüsseln.</span>', type: true, speed: 25, delay: 500 },
                { fn: addEmpty, delay: 200 },
                { fn: addSep, delay: 200 },
                { fn: addEmpty, delay: 300 },
            ];

            runSequence(loreLines, startTerminal);
        }

        // ============================================================
        //  TERMINAL
        // ============================================================
        function startTerminal() {
            skipBtn.classList.add('hidden');
            addLine('SYSTEM', 'Forscher-Terminal v0.7 — Bereit', 'success');
            addLine('SYSTEM', 'Authentifizierung erforderlich', 'warn-text');
            addLine('SYSTEM', 'Befehl: login &lt;Benutzername&gt; &lt;Passwort&gt;', 'text');
            addLine('SYSTEM', 'Gib "help" für verfügbare Befehle ein.', 'text');
            addEmpty();

            inputLineEl = document.createElement('div');
            inputLineEl.className = 'input-line';
            inputLineEl.innerHTML = '<span class="prompt">forscher@seelenreich:~$</span>';
            inputEl = document.createElement('input');
            inputEl.type = 'text';
            inputEl.className = 'terminal-input';
            inputEl.placeholder = 'Befehl eingeben...';
            inputEl.autocomplete = 'off';
            inputEl.spellcheck = false;
            inputLineEl.appendChild(inputEl);
            terminal.appendChild(inputLineEl);

            stickyNote.classList.add('show');
            inputEl.focus();
            scrollBottom();

            inputEl.addEventListener('keydown', function(e) {
                if (e.key.length === 1) SFX.keyPress();
                if (e.key === 'Enter') {
                    var raw = inputEl.value.trim();
                    inputEl.value = '';
                    if (!raw || decrypting) return;
                    addEcho(raw);
                    processCommand(raw);
                }
            });

            document.addEventListener('click', function() {
                if (!decrypting && inputEl) inputEl.focus();
            });
        }

        // ============================================================
        //  COMMANDS
        // ============================================================
        function processCommand(raw) {
            var parts = raw.split(/\s+/);
            var cmd = parts[0].toLowerCase();
            if (loggedIn) { postLogin(cmd, parts); return; }

            switch(cmd) {
                case 'help':
                    addEmpty();
                    addLine('HELP', 'Verfügbare Befehle:', 'success');
                    addLine('HELP', 'help ............... Diese Hilfe anzeigen', 'text');
                    addLine('HELP', 'login &lt;user&gt; &lt;pass&gt; . Authentifizierung', 'text');
                    addLine('HELP', 'status ............. Systemstatus anzeigen', 'text');
                    addLine('HELP', 'whoami ............. Aktuelle Sitzung', 'text');
                    addEmpty();
                    break;
                case 'status':
                    addLine('SYSTEM', 'Verbindung: INSTABIL', 'warn-text');
                    addLine('SYSTEM', 'Verschlüsselte Datenfragmente: 1', 'text');
                    addLine('SYSTEM', 'Authentifizierung: AUSSTEHEND', 'error-text');
                    break;
                case 'whoami':
                    addLine('SYSTEM', 'Sitzung: ANONYM — Authentifizierung erforderlich', 'warn-text');
                    break;
                case 'login':
                    handleLogin(parts); break;
                case 'decrypt': case 'entschlüsseln':
                    addLine('SYSTEM', 'ZUGANG VERWEIGERT — Authentifizierung erforderlich.', 'error-text');
                    break;
                default:
                    addLine('SYSTEM', 'Unbekannter Befehl: "' + esc(cmd) + '"', 'error-text');
                    addLine('SYSTEM', 'Gib "help" für verfügbare Befehle ein.', 'text');
            }
        }

        function handleLogin(parts) {
            if (parts.length < 3) {
                addLine('AUTH', 'Verwendung: login &lt;Benutzername&gt; &lt;Passwort&gt;', 'warn-text');
                return;
            }
            var user = parts[1];
            var pass = parts.slice(2).join(' ');
            loginAttempts++;
            addLine('AUTH', 'Authentifiziere "' + esc(user) + '"...', 'text');
            inputEl.disabled = true;

            // Async SHA-256 comparison
            Promise.all([
                sha256(user.toLowerCase()),
                sha256(pass.toLowerCase())
            ]).then(function(hashes) {
                setTimeout(function() {
                    if (hashes[0] === USER_HASH && hashes[1] === PASS_HASH) {
                        // Decrypt TARGET with the entered password
                        TARGET = decryptTarget(pass);
                        localStorage.setItem('arg-phase', 's33l3nreich');
                        SFX.loginSuccess();
                        flash(); shake(); addEmpty();
                        addLine('AUTH', '✓ ZUGANG GEWÄHRT', 'success');
                        addLine('AUTH', 'Willkommen zurück, Watson.', 'success');
                        addEmpty();
                        addLine('SYSTEM', 'Verschlüsselte Datenfragmente gefunden.', 'text');
                        addLine('SYSTEM', 'Befehl "decrypt" zum Entschlüsseln verfügbar.', 'success');
                        addEmpty();
                        loggedIn = true;
                        stickyNote.style.display = 'none';
                    } else {
                        SFX.loginFail();
                        shake();
                        addLine('AUTH', '✗ ZUGANG VERWEIGERT', 'error-text');
                        if (hashes[0] !== USER_HASH)
                            addLine('AUTH', 'Benutzer "' + esc(user) + '" nicht gefunden.', 'error-text');
                        else
                            addLine('AUTH', 'Passwort ungültig.', 'error-text');
                        if (loginAttempts >= 3)
                            addLine('SYSTEM', 'Tipp: Habt ihr alles auf dem Bildschirm überprüft?', 'warn-text');
                    }
                    inputEl.disabled = false;
                    inputEl.focus();
                }, 1200);
            });
        }

        function postLogin(cmd, parts) {
            switch(cmd) {
                case 'help':
                    addEmpty();
                    addLine('HELP', 'Verfügbare Befehle:', 'success');
                    addLine('HELP', 'help ....... Diese Hilfe anzeigen', 'text');
                    addLine('HELP', 'decrypt .... Datenfragment entschlüsseln', 'text');
                    addLine('HELP', 'status ..... Systemstatus', 'text');
                    addLine('HELP', 'whoami ..... Aktuelle Sitzung', 'text');
                    addLine('HELP', 'logs ....... Letzte Logeinträge', 'text');
                    addEmpty();
                    break;
                case 'status':
                    addLine('SYSTEM', 'Verbindung: INSTABIL', 'warn-text');
                    addLine('SYSTEM', 'Datenfragmente: 1', 'text');
                    addLine('SYSTEM', 'Auth: WATSON ✓', 'success');
                    break;
                case 'whoami':
                    addLine('SYSTEM', 'Sitzung: Watson — Authentifiziert', 'success');
                    break;
                case 'logs':
                    addEmpty();
                    addLine('LOG', '[Tag 1] Erste Zeichen am Altar entdeckt.', 'text');
                    addLine('LOG', '[Tag 4] Die Grenze schrumpft schneller.', 'text');
                    addLine('LOG', '[Tag 6] Ritual vorbereitet. Ich bin bereit.', 'warn-text');
                    addLine('LOG', '[Tag 7] Der Wächter... er ist zu stark.', 'error-text');
                    addLine('LOG', '[Tag 7] Das Seelenreich. Ich bin gefangen.', 'error-text');
                    addLine('LOG', '[Tag ?] ...findet die Welt. Beendet es.', 'success');
                    addEmpty();
                    break;
                case 'decrypt': case 'entschlüsseln':
                    startDecryption(); break;
                case 'login':
                    addLine('SYSTEM', 'Bereits angemeldet als Watson.', 'warn-text');
                    break;
                default:
                    addLine('SYSTEM', 'Unbekannter Befehl: "' + esc(cmd) + '"', 'error-text');
                    addLine('SYSTEM', 'Gib "help" ein.', 'text');
            }
        }

        // ============================================================
        //  DECRYPTION
        // ============================================================
        var decChars = [];
        var scrambleInterval;

        function startDecryption() {
            decrypting = true;
            inputEl.disabled = true;
            addEmpty();
            addLine('DECRYPT', 'Starte Entschlüsselungsprotokoll...', 'success');
            addLine('DECRYPT', 'Datenfragment wird geladen...', 'text');

            setTimeout(function() {
                var displayEl = document.createElement('div');
                displayEl.className = 'decrypt-display active';
                terminal.insertBefore(displayEl, inputLineEl);

                var progEl = document.createElement('div');
                progEl.className = 'progress-bar active';
                progEl.innerHTML = '<div class="fill" id="progress-fill"></div>';
                terminal.insertBefore(progEl, inputLineEl);

                initDisplay(displayEl);
                shake();
                scrollBottom();

                setTimeout(function() {
                    addLine('DECRYPT', 'Entschlüsselung läuft...', 'warn-text');
                    runDecryption(displayEl, document.getElementById('progress-fill'), progEl);
                }, 800);
            }, 1000);
        }

        function initDisplay(displayEl) {
            displayEl.innerHTML = '';
            decChars = [];
            for (var i = 0; i < TARGET.length; i++) {
                var span = document.createElement('span');
                if (TARGET[i] === '.' || TARGET[i] === '-') {
                    span.textContent = TARGET[i];
                    span.className = 'char dot';
                    span.dataset.resolved = 'true';
                } else {
                    span.className = 'char scrambling';
                    span.textContent = SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
                    span.dataset.resolved = 'false';
                }
                displayEl.appendChild(span);
                decChars.push(span);
            }
            scrambleInterval = setInterval(function() {
                if (Math.random() < 0.3) SFX.scrambleTick();
                decChars.forEach(function(s) {
                    if (s.dataset.resolved === 'false')
                        s.textContent = SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
                });
            }, 70);
        }

        function runDecryption(displayEl, fillEl, progEl) {
            var indices = [];
            for (var i = 0; i < TARGET.length; i++) {
                if (TARGET[i] !== '.' && TARGET[i] !== '-') indices.push(i);
            }
            for (var i = indices.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var t = indices[i]; indices[i] = indices[j]; indices[j] = t;
            }
            var total = indices.length;
            var resolved = 0;

            function next() {
                if (indices.length === 0) {
                    clearInterval(scrambleInterval);
                    finish(progEl); return;
                }
                var idx = indices.shift();
                var span = decChars[idx];
                var fc = 0;
                var fm = 6 + Math.floor(Math.random() * 6);
                var fi = setInterval(function() {
                    span.textContent = SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
                    fc++;
                    if (fc >= fm) {
                        clearInterval(fi);
                        span.textContent = TARGET[idx];
                        span.className = 'char resolved';
                        span.dataset.resolved = 'true';
                        SFX.charLock();
                        resolved++;
                        fillEl.style.width = ((resolved / total) * 100) + '%';
                        var pct = Math.round((resolved / total) * 100);
                        if (pct === 25) { addLine('DECRYPT', 'Erste Datenschicht... 25%', 'text'); shake(); }
                        else if (pct === 50) { addLine('DECRYPT', 'Fragmentrekonstruktion... 50%', 'warn-text'); shake(); }
                        else if (pct === 75) { SFX.warn(); addLine('SYSTEM', 'WARNUNG: Instabile Verbindung!', 'error-text'); shake(); }
                        scrollBottom();
                        setTimeout(next, 150 + Math.random() * 250);
                    }
                }, 45);
            }
            setTimeout(next, 500);
        }

        function finish(progEl) {
            SFX.reveal();
            shake();
            addLine('DECRYPT', 'ENTSCHLÜSSELUNG ABGESCHLOSSEN.', 'success');
            addLine('SYSTEM', 'Koordinaten extrahiert.', 'success');

            setTimeout(function() {
                progEl.style.display = 'none';
                inputLineEl.style.display = 'none';

                var box = document.createElement('div');
                box.className = 'final-box';
                box.innerHTML = '<p class="warn" style="font-size:1.2rem;letter-spacing:3px;">ZIEL GEFUNDEN</p>' +
                    '<p class="ip-text">' + TARGET + '</p>' +
                    '<hr style="border:none;border-top:1px solid #0e2e0e;margin:15px 0;">' +
                    '<p style="color:#d4a030;font-size:1.1rem;text-shadow:0 0 5px rgba(212,160,48,0.25);">Die verfluchte Welt erwartet euch.</p>' +
                    '<p style="color:#d4a030;font-size:1.1rem;text-shadow:0 0 5px rgba(212,160,48,0.25);">Brecht den Fluch. Befreit mich.</p>' +
                    '<p class="dim" style="margin-top:12px;font-size:0.9rem;">— Der Forscher</p>';
                terminal.appendChild(box);

                setTimeout(function() {
                    box.classList.add('visible');
                    addEmpty();
                    addLine('FORSCHER', 'Ihr habt mich gefunden... brecht den Fluch.', 'success');
                    scrollBottom();
                }, 300);
            }, 1500);
        }

        // ============================================================
        //  START
        // ============================================================
        startBoot();
    </script>
