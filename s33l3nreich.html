<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAS SEELENREICH</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #b0b0b0;
            font-family: 'VT323', 'Courier New', monospace;
            font-size: 1.1rem;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Scanlines */
        .scanlines {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
            background: repeating-linear-gradient(
                0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px,
                transparent 1px, transparent 3px
            );
        }

        /* Full-screen terminal */
        .terminal {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px 20px 120px 20px;
            min-height: 100vh;
        }

        .terminal-line {
            margin-bottom: 2px;
            word-break: break-word;
        }

        .prefix { color: #00ff41; }
        .text { color: #888; }
        .ok { color: #00ff41; text-shadow: 0 0 5px rgba(0,255,65,0.3); }
        .warn-text { color: #ffaa00; }
        .error-text { color: #ff4444; }
        .success { color: #00ff41; text-shadow: 0 0 8px rgba(0,255,65,0.4); }
        .brand { color: #00ff41; font-size: 1.3rem; text-shadow: 0 0 10px rgba(0,255,65,0.4); }
        .dim { color: #333; }
        .highlight { color: #00ff41; }
        .warn { color: #ff4444; }
        .separator { color: #1a3a1a; }

        /* Lore text (typed in terminal) */
        .lore-line {
            color: #999;
            margin-bottom: 2px;
        }
        .lore-line .highlight { color: #00ff41; }
        .lore-line .warn { color: #ff4444; }

        /* Input line */
        .input-line {
            display: flex;
            align-items: center;
            margin-top: 6px;
        }

        .input-line .prompt {
            color: #00ff41;
            margin-right: 8px;
            white-space: nowrap;
        }

        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: 'VT323', 'Courier New', monospace;
            font-size: 1.15rem;
            outline: none;
            caret-color: #00ff41;
            letter-spacing: 1px;
        }

        .terminal-input::placeholder { color: #1a3a1a; }
        .terminal-input:disabled { opacity: 0.4; }

        /* Sticky Note */
        .sticky-note {
            position: fixed; top: 18px; right: 18px;
            width: 180px; padding: 18px 16px 14px 16px;
            background: #f5e960; color: #222;
            font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
            font-size: 0.95rem; line-height: 1.5;
            box-shadow: 3px 5px 14px rgba(0,0,0,0.5);
            transform: rotate(3deg); z-index: 500;
            border-bottom-right-radius: 30px 8px;
            display: none;
        }
        .sticky-note.show { display: block; }
        .sticky-note::before {
            content: ''; position: absolute; top: -6px; left: 50%;
            transform: translateX(-50%); width: 50px; height: 12px;
            background: rgba(200,200,200,0.5); border-radius: 2px;
        }
        .sticky-note .note-title {
            font-weight: bold; font-size: 0.8rem; color: #555;
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;
        }
        .sticky-note .note-pw {
            font-size: 1.3rem; font-weight: bold; color: #1a1a1a;
            margin-top: 4px; letter-spacing: 2px;
        }

        /* Decrypt display */
        .decrypt-display {
            font-size: 2rem; letter-spacing: 6px; text-align: center;
            margin: 15px 0; padding: 20px;
            border: 1px solid #1a3a1a; background: #050505;
            color: #00ff41; text-shadow: 0 0 10px rgba(0,255,65,0.6);
            font-family: 'VT323', monospace; min-height: 70px;
            display: none; align-items: center; justify-content: center;
            word-break: break-all;
        }
        .decrypt-display.active { display: flex; }
        .decrypt-display .char { display: inline-block; min-width: 0.6em; text-align: center; }
        .decrypt-display .char.scrambling { color: #335533; text-shadow: none; }
        .decrypt-display .char.resolved { color: #00ff41; text-shadow: 0 0 10px #00ff41, 0 0 20px rgba(0,255,65,0.4); }
        .decrypt-display .char.dot { color: #00ff41; }

        /* Progress bar */
        .progress-bar {
            width: 100%; height: 3px; background: #111;
            margin: 10px 0; border-radius: 2px; overflow: hidden; display: none;
        }
        .progress-bar.active { display: block; }
        .progress-bar .fill { height: 100%; width: 0%; background: #00ff41; box-shadow: 0 0 10px #00ff41; transition: width 0.3s; }

        /* Final box */
        .final-box {
            text-align: center; margin-top: 20px; padding: 20px;
            border: 1px solid #00ff41; background: rgba(0,255,65,0.03);
            opacity: 0; transition: opacity 1.5s ease-in;
        }
        .final-box.visible { opacity: 1; }
        .final-box .ip-text {
            color: #00ff41; font-size: 1.8rem;
            text-shadow: 0 0 15px rgba(0,255,65,0.7);
            letter-spacing: 3px; margin: 10px 0;
        }

        /* Flash */
        .screen-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #00ff41; opacity: 0; pointer-events: none; z-index: 999;
            transition: opacity 0.1s;
        }
        .screen-flash.flash { opacity: 0.15; }

        @keyframes shake-hard {
            0%, 100% { transform: translate(0,0); }
            10% { transform: translate(-3px,2px); }
            20% { transform: translate(3px,-1px); }
            30% { transform: translate(-2px,3px); }
            40% { transform: translate(2px,-2px); }
            50% { transform: translate(-3px,1px); }
            60% { transform: translate(1px,-3px); }
            70% { transform: translate(-1px,2px); }
            80% { transform: translate(3px,-1px); }
            90% { transform: translate(-2px,3px); }
        }
        .shaking { animation: shake-hard 0.15s linear infinite; }

        /* Audio */
        .audio-toggle {
            position: fixed; bottom: 15px; right: 15px;
            background: rgba(0,255,65,0.08); border: 1px solid #1a3a1a;
            color: #00ff41; font-family: 'VT323', monospace; font-size: 0.85rem;
            padding: 6px 12px; cursor: pointer; z-index: 500;
            transition: all 0.3s; letter-spacing: 1px;
        }
        .audio-toggle:hover { background: rgba(0,255,65,0.15); border-color: #00ff41; }
        .audio-toggle.muted { color: #555; border-color: #222; }

        @media (max-width: 600px) {
            .terminal { padding: 12px 10px 100px 10px; }
            body { font-size: 0.95rem; }
            .sticky-note { top: auto; bottom: 50px; right: 10px; width: 155px; font-size: 0.85rem; }
            .decrypt-display { font-size: 1.3rem; letter-spacing: 3px; padding: 15px 10px; }
            .brand { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="screen-flash" id="screen-flash"></div>

    <audio id="ambient-audio" loop preload="auto">
        <source src="ambient.mp3" type="audio/mpeg">
    </audio>
    <button class="audio-toggle" id="audio-toggle" title="Audio an/aus">♪ AUDIO</button>

    <div class="sticky-note" id="sticky-note">
        <div class="note-title">Passwort:</div>
        <div>Nicht vergessen!!</div>
        <div class="note-pw">Seele731</div>
    </div>

    <div class="terminal" id="terminal">
        <!-- Everything is injected by JS -->
    </div>

    <script>
        // ============================================================
        //  CONFIG
        // ============================================================
        const TARGET = 'eu8573000.g-portal.game';
        const VALID_USER = 'watson';
        const VALID_PASS = 'Seele731';
        const SCRAMBLE_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*!?<>{}[]';

        const terminal = document.getElementById('terminal');
        const stickyNote = document.getElementById('sticky-note');
        const screenFlash = document.getElementById('screen-flash');

        let inputEl = null;
        let inputLineEl = null;
        let loggedIn = false;
        let decrypting = false;
        let loginAttempts = 0;

        // ============================================================
        //  AUDIO
        // ============================================================
        const audio = document.getElementById('ambient-audio');
        const audioBtn = document.getElementById('audio-toggle');
        let audioPlaying = false;
        audio.volume = 1.0;

        function tryPlayAudio() {
            audio.play().then(function() {
                audioPlaying = true;
                audioBtn.textContent = '♪ AUDIO';
                audioBtn.classList.remove('muted');
            }).catch(function() {
                audioPlaying = false;
                audioBtn.textContent = '♪ AUDIO AUS';
                audioBtn.classList.add('muted');
            });
        }
        tryPlayAudio();
        document.addEventListener('click', function s() {
            if (!audioPlaying) tryPlayAudio();
            document.removeEventListener('click', s);
        }, { once: false });

        audioBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (audioPlaying) {
                audio.pause(); audioPlaying = false;
                audioBtn.textContent = '♪ AUDIO AUS'; audioBtn.classList.add('muted');
            } else {
                audio.play(); audioPlaying = true;
                audioBtn.textContent = '♪ AUDIO'; audioBtn.classList.remove('muted');
            }
        });

        // ============================================================
        //  HELPERS
        // ============================================================
        function addRaw(html) {
            const div = document.createElement('div');
            div.className = 'terminal-line';
            div.innerHTML = html;
            if (inputLineEl) {
                terminal.insertBefore(div, inputLineEl);
            } else {
                terminal.appendChild(div);
            }
            scrollBottom();
            return div;
        }

        function addLine(prefix, text, cls) {
            return addRaw('<span class="prefix">[' + prefix + ']</span> <span class="' + (cls||'text') + '">' + text + '</span>');
        }

        function addEmpty() { addRaw('&nbsp;'); }

        function addSep() { addRaw('<span class="separator">════════════════════════════════════════════</span>'); }

        function addEcho(cmd) {
            addRaw('<span class="prefix">forscher@seelenreich:~$</span> <span class="success">' + esc(cmd) + '</span>');
        }

        function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function scrollBottom() { window.scrollTo(0, document.body.scrollHeight); }

        function flash() {
            screenFlash.classList.add('flash');
            setTimeout(function() { screenFlash.classList.remove('flash'); }, 100);
        }

        function shake() {
            document.body.classList.add('shaking');
            setTimeout(function() { document.body.classList.remove('shaking'); }, 300);
        }

        // ============================================================
        //  SEQUENCER — runs lines with delays
        // ============================================================
        function runSequence(lines, callback) {
            let i = 0;
            function next() {
                if (i >= lines.length) { if (callback) callback(); return; }
                const l = lines[i];
                if (l.fn) { l.fn(); }
                else { addRaw(l.html); }
                i++;
                setTimeout(next, l.delay || 200);
            }
            next();
        }

        // ============================================================
        //  BOOT SEQUENCE
        // ============================================================
        function startBoot() {
            const bootLines = [
                { html: '<span class="brand">FORSCHER-OS v0.7.3 — BIOS POST</span>', delay: 500 },
                { fn: addSep, delay: 250 },
                { html: 'CPU .............. Seelenreich Cortex M7      [<span class="ok">OK</span>]', delay: 300 },
                { html: 'RAM .............. 4096 KB                     [<span class="ok">OK</span>]', delay: 250 },
                { html: 'Netzwerk ......... Seelenreich-Brücke          [<span class="warn-text">INSTABIL</span>]', delay: 350 },
                { html: 'Speicher ......... Fragmentiert                [<span class="warn-text">WARNUNG</span>]', delay: 300 },
                { html: 'Verschlüsselung . Datenfragment erkannt        [<span class="ok">OK</span>]', delay: 250 },
                { html: 'Seelen-Signatur . Forscher_Watson              [<span class="ok">GEFUNDEN</span>]', delay: 350 },
                { fn: addSep, delay: 250 },
                { html: 'POST abgeschlossen. Starte Terminal...', delay: 700 },
                { fn: addEmpty, delay: 300 },
                { html: 'Verbinde mit Seelenreich-Netzwerk...', delay: 900 },
                { html: 'Tunneling durch Dimensionsriss ████████ ....', delay: 700 },
                { html: 'Signalstärke: <span class="warn-text">23%</span> — Verbindung instabil', delay: 500 },
                { html: 'Authentifizierungsmodul geladen.', delay: 400 },
                { fn: addEmpty, delay: 200 },
                { html: '<span class="ok">✓ Verbindung hergestellt.</span>', delay: 600 },
                { fn: function() { flash(); }, delay: 300 },
            ];

            runSequence(bootLines, startLore);
        }

        // ============================================================
        //  LORE — types out in the terminal
        // ============================================================
        function startLore() {
            const loreLines = [
                { fn: addEmpty, delay: 400 },
                { fn: addSep, delay: 200 },
                { html: '<span class="brand">EINGEHENDE NACHRICHT — QUELLE: SEELENREICH</span>', delay: 600 },
                { fn: addSep, delay: 300 },
                { fn: addEmpty, delay: 200 },
                { html: '<span class="lore-line">Ihr habt den Code gefunden. Dann seid ihr bereit.</span>', delay: 500 },
                { fn: addEmpty, delay: 200 },
                { html: '<span class="lore-line">Ich sitze hier, im Seelenreich, zwischen Schatten und Stille.</span>', delay: 500 },
                { html: '<span class="lore-line">Einst war ich wie ihr — ein Forscher, ein Spieler.</span>', delay: 500 },
                { html: '<span class="lore-line">Der Fluch hat mich genommen. <span class="warn">Langsam. Gnadenlos.</span></span>', delay: 600 },
                { fn: addEmpty, delay: 300 },
                { html: '<span class="lore-line">Aber die verfluchte Welt existiert noch. Der Altar wartet noch.</span>', delay: 500 },
                { html: '<span class="lore-line">Wo ich versagt habe, könnt ihr es schaffen.</span>', delay: 500 },
                { fn: addEmpty, delay: 300 },
                { html: '<span class="lore-line">Mein Terminal ist noch aktiv.</span>', delay: 400 },
                { html: '<span class="lore-line">Meldet euch an, um die <span class="highlight">Koordinaten der verfluchten Welt</span> zu entschlüsseln.</span>', delay: 600 },
                { fn: addEmpty, delay: 200 },
                { fn: addSep, delay: 200 },
                { fn: addEmpty, delay: 300 },
            ];

            runSequence(loreLines, startTerminal);
        }

        // ============================================================
        //  TERMINAL — login prompt
        // ============================================================
        function startTerminal() {
            addLine('SYSTEM', 'Forscher-Terminal v0.7 — Bereit', 'success');
            addLine('SYSTEM', 'Authentifizierung erforderlich', 'warn-text');
            addLine('SYSTEM', 'Befehl: login &lt;Benutzername&gt; &lt;Passwort&gt;', 'text');
            addLine('SYSTEM', 'Gib "help" für verfügbare Befehle ein.', 'text');
            addEmpty();

            // Create input line
            inputLineEl = document.createElement('div');
            inputLineEl.className = 'input-line';
            inputLineEl.innerHTML = '<span class="prompt">forscher@seelenreich:~$</span>';
            inputEl = document.createElement('input');
            inputEl.type = 'text';
            inputEl.className = 'terminal-input';
            inputEl.placeholder = 'Befehl eingeben...';
            inputEl.autocomplete = 'off';
            inputEl.spellcheck = false;
            inputLineEl.appendChild(inputEl);
            terminal.appendChild(inputLineEl);

            // Show sticky note
            stickyNote.classList.add('show');

            inputEl.focus();
            scrollBottom();

            inputEl.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const raw = inputEl.value.trim();
                    inputEl.value = '';
                    if (!raw || decrypting) return;
                    addEcho(raw);
                    processCommand(raw);
                }
            });

            document.addEventListener('click', function() {
                if (!decrypting && inputEl) inputEl.focus();
            });
        }

        // ============================================================
        //  COMMANDS
        // ============================================================
        function processCommand(raw) {
            const parts = raw.split(/\s+/);
            const cmd = parts[0].toLowerCase();

            if (loggedIn) { postLogin(cmd, parts); return; }

            switch(cmd) {
                case 'help':
                    addEmpty();
                    addLine('HELP', 'Verfügbare Befehle:', 'success');
                    addLine('HELP', 'help ............... Diese Hilfe anzeigen', 'text');
                    addLine('HELP', 'login &lt;user&gt; &lt;pass&gt; . Authentifizierung', 'text');
                    addLine('HELP', 'status ............. Systemstatus anzeigen', 'text');
                    addLine('HELP', 'whoami ............. Aktuelle Sitzung', 'text');
                    addEmpty();
                    break;
                case 'status':
                    addLine('SYSTEM', 'Verbindung: INSTABIL', 'warn-text');
                    addLine('SYSTEM', 'Verschlüsselte Datenfragmente: 1', 'text');
                    addLine('SYSTEM', 'Authentifizierung: AUSSTEHEND', 'error-text');
                    break;
                case 'whoami':
                    addLine('SYSTEM', 'Sitzung: ANONYM — Authentifizierung erforderlich', 'warn-text');
                    break;
                case 'login':
                    handleLogin(parts);
                    break;
                case 'decrypt': case 'entschlüsseln':
                    addLine('SYSTEM', 'ZUGANG VERWEIGERT — Authentifizierung erforderlich.', 'error-text');
                    break;
                default:
                    addLine('SYSTEM', 'Unbekannter Befehl: "' + esc(cmd) + '"', 'error-text');
                    addLine('SYSTEM', 'Gib "help" für verfügbare Befehle ein.', 'text');
            }
        }

        function handleLogin(parts) {
            if (parts.length < 3) {
                addLine('AUTH', 'Verwendung: login &lt;Benutzername&gt; &lt;Passwort&gt;', 'warn-text');
                return;
            }
            const user = parts[1];
            const pass = parts.slice(2).join(' ');
            loginAttempts++;
            addLine('AUTH', 'Authentifiziere "' + esc(user) + '"...', 'text');
            inputEl.disabled = true;

            setTimeout(function() {
                if (user.toLowerCase() === VALID_USER && pass === VALID_PASS) {
                    flash(); addEmpty();
                    addLine('AUTH', '✓ ZUGANG GEWÄHRT', 'success');
                    addLine('AUTH', 'Willkommen zurück, Watson.', 'success');
                    addEmpty();
                    addLine('SYSTEM', 'Verschlüsselte Datenfragmente gefunden.', 'text');
                    addLine('SYSTEM', 'Befehl "decrypt" zum Entschlüsseln verfügbar.', 'success');
                    addEmpty();
                    loggedIn = true;
                    stickyNote.style.display = 'none';
                } else {
                    shake();
                    addLine('AUTH', '✗ ZUGANG VERWEIGERT', 'error-text');
                    if (user.toLowerCase() !== VALID_USER) {
                        addLine('AUTH', 'Benutzer "' + esc(user) + '" nicht gefunden.', 'error-text');
                    } else {
                        addLine('AUTH', 'Passwort ungültig.', 'error-text');
                    }
                    if (loginAttempts >= 3) {
                        addLine('SYSTEM', 'Tipp: Habt ihr alles auf dem Bildschirm überprüft?', 'warn-text');
                    }
                }
                inputEl.disabled = false;
                inputEl.focus();
            }, 1200);
        }

        function postLogin(cmd, parts) {
            switch(cmd) {
                case 'help':
                    addEmpty();
                    addLine('HELP', 'Verfügbare Befehle:', 'success');
                    addLine('HELP', 'help ....... Diese Hilfe anzeigen', 'text');
                    addLine('HELP', 'decrypt .... Datenfragment entschlüsseln', 'text');
                    addLine('HELP', 'status ..... Systemstatus', 'text');
                    addLine('HELP', 'whoami ..... Aktuelle Sitzung', 'text');
                    addLine('HELP', 'logs ....... Letzte Logeinträge', 'text');
                    addEmpty();
                    break;
                case 'status':
                    addLine('SYSTEM', 'Verbindung: INSTABIL', 'warn-text');
                    addLine('SYSTEM', 'Datenfragmente: 1', 'text');
                    addLine('SYSTEM', 'Auth: WATSON ✓', 'success');
                    break;
                case 'whoami':
                    addLine('SYSTEM', 'Sitzung: Watson — Authentifiziert', 'success');
                    break;
                case 'logs':
                    addEmpty();
                    addLine('LOG', '[Tag 1] Erste Zeichen am Altar entdeckt.', 'text');
                    addLine('LOG', '[Tag 4] Die Grenze schrumpft schneller.', 'text');
                    addLine('LOG', '[Tag 6] Ritual vorbereitet. Ich bin bereit.', 'warn-text');
                    addLine('LOG', '[Tag 7] Der Wächter... er ist zu stark.', 'error-text');
                    addLine('LOG', '[Tag 7] Das Seelenreich. Ich bin gefangen.', 'error-text');
                    addLine('LOG', '[Tag ?] ...findet die Welt. Beendet es.', 'success');
                    addEmpty();
                    break;
                case 'decrypt': case 'entschlüsseln':
                    startDecryption();
                    break;
                case 'login':
                    addLine('SYSTEM', 'Bereits angemeldet als Watson.', 'warn-text');
                    break;
                default:
                    addLine('SYSTEM', 'Unbekannter Befehl: "' + esc(cmd) + '"', 'error-text');
                    addLine('SYSTEM', 'Gib "help" ein.', 'text');
            }
        }

        // ============================================================
        //  DECRYPTION
        // ============================================================
        let chars = [];
        let scrambleInterval;

        function startDecryption() {
            decrypting = true;
            inputEl.disabled = true;
            addEmpty();
            addLine('DECRYPT', 'Starte Entschlüsselungsprotokoll...', 'success');
            addLine('DECRYPT', 'Datenfragment wird geladen...', 'text');

            setTimeout(function() {
                // Create display + progress
                const displayEl = document.createElement('div');
                displayEl.className = 'decrypt-display active';
                displayEl.id = 'decrypt-display';
                terminal.insertBefore(displayEl, inputLineEl);

                const progEl = document.createElement('div');
                progEl.className = 'progress-bar active';
                progEl.innerHTML = '<div class="fill" id="progress-fill"></div>';
                terminal.insertBefore(progEl, inputLineEl);

                initDisplay(displayEl);
                shake();
                scrollBottom();

                setTimeout(function() {
                    addLine('DECRYPT', 'Entschlüsselung läuft...', 'warn-text');
                    runDecryption(displayEl, document.getElementById('progress-fill'), progEl);
                }, 800);
            }, 1000);
        }

        function initDisplay(displayEl) {
            displayEl.innerHTML = '';
            chars = [];
            for (let i = 0; i < TARGET.length; i++) {
                const span = document.createElement('span');
                if (TARGET[i] === '.' || TARGET[i] === '-') {
                    span.textContent = TARGET[i];
                    span.className = 'char dot';
                    span.dataset.resolved = 'true';
                } else {
                    span.className = 'char scrambling';
                    span.textContent = SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
                    span.dataset.resolved = 'false';
                }
                displayEl.appendChild(span);
                chars.push(span);
            }
            scrambleInterval = setInterval(function() {
                chars.forEach(function(s) {
                    if (s.dataset.resolved === 'false')
                        s.textContent = SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
                });
            }, 80);
        }

        function runDecryption(displayEl, fillEl, progEl) {
            let indices = [];
            for (let i = 0; i < TARGET.length; i++) {
                if (TARGET[i] !== '.' && TARGET[i] !== '-') indices.push(i);
            }
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const t = indices[i]; indices[i] = indices[j]; indices[j] = t;
            }
            const total = indices.length;
            let resolved = 0;

            function next() {
                if (indices.length === 0) {
                    clearInterval(scrambleInterval);
                    finish(progEl);
                    return;
                }
                const idx = indices.shift();
                const span = chars[idx];
                let fc = 0;
                const fm = 6 + Math.floor(Math.random() * 6);
                const fi = setInterval(function() {
                    span.textContent = SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
                    fc++;
                    if (fc >= fm) {
                        clearInterval(fi);
                        span.textContent = TARGET[idx];
                        span.className = 'char resolved';
                        span.dataset.resolved = 'true';
                        flash();
                        resolved++;
                        fillEl.style.width = ((resolved / total) * 100) + '%';
                        const pct = Math.round((resolved / total) * 100);
                        if (pct === 25) { addLine('DECRYPT', 'Erste Datenschicht... 25%', 'text'); shake(); }
                        else if (pct === 50) { addLine('DECRYPT', 'Fragmentrekonstruktion... 50%', 'warn-text'); shake(); }
                        else if (pct === 75) { addLine('SYSTEM', 'WARNUNG: Instabile Verbindung!', 'error-text'); shake(); }
                        scrollBottom();
                        setTimeout(next, 150 + Math.random() * 250);
                    }
                }, 50);
            }
            setTimeout(next, 500);
        }

        function finish(progEl) {
            shake(); flash();
            setTimeout(flash, 200);
            setTimeout(flash, 400);
            addLine('DECRYPT', 'ENTSCHLÜSSELUNG ABGESCHLOSSEN.', 'success');
            addLine('SYSTEM', 'Koordinaten extrahiert.', 'success');

            setTimeout(function() {
                progEl.style.display = 'none';
                inputLineEl.style.display = 'none';

                // Final box
                const box = document.createElement('div');
                box.className = 'final-box';
                box.innerHTML = '<p class="warn">ZIEL GEFUNDEN</p>' +
                    '<p class="ip-text">' + TARGET + '</p>' +
                    '<hr style="border:none;border-top:1px solid #1a3a1a;margin:15px 0;">' +
                    '<p style="color:#888;font-size:1.1rem;">Die verfluchte Welt erwartet euch.</p>' +
                    '<p style="color:#888;font-size:1.1rem;">Brecht den Fluch. Befreit mich.</p>' +
                    '<p class="dim" style="margin-top:12px;font-size:0.9rem;">— Der Forscher</p>';
                terminal.appendChild(box);

                setTimeout(function() {
                    box.classList.add('visible');
                    addEmpty();
                    addLine('FORSCHER', 'Ihr habt mich gefunden... brecht den Fluch.', 'success');
                    scrollBottom();
                }, 300);
            }, 1500);
        }

        // ============================================================
        //  START
        // ============================================================
        startBoot();
    </script>
</body>
</html>
