<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAS SEELENREICH</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁</text></svg>">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===================== PAGE OVERRIDES ===================== */
        body {
            background: #000;
            color: #b0b0b0;
            font-size: 1.1rem;
        }

        /* CRT curvature + vignette (page-specific barrel effect) */
        .crt::before {
            content: '';
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            pointer-events: none;
            z-index: 1001;
            background: radial-gradient(
                ellipse at center,
                transparent 60%,
                rgba(0,0,0,0.35) 80%,
                rgba(0,0,0,0.75) 100%
            );
        }

        /* CRT barrel distortion simulation */
        .crt::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1002;
            box-shadow:
                inset 0 0 80px rgba(0,0,0,0.6),
                inset 0 0 160px rgba(0,0,0,0.3);
            border-radius: 18px;
        }

        /* z-index overrides — CRT layers need higher values on this page */
        .skip-btn, .audio-toggle { z-index: 1500; }
        .audio-toggle { text-shadow: 0 0 5px rgba(0,255,65,0.3); }

        /* Horizontal flicker line */
        .flicker-line {
            position: fixed; left: 0;
            width: 100%; height: 2px;
            background: rgba(0,255,65,0.08);
            pointer-events: none; z-index: 1003;
            animation: flicker-move 6s linear infinite;
            box-shadow: 0 0 12px 2px rgba(0,255,65,0.06);
        }

        @keyframes flicker-move {
            0% { top: -2px; }
            100% { top: 100vh; }
        }

        /* ===================== CRT GLOW ===================== */
        .crt-glow {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background: radial-gradient(
                ellipse at center,
                rgba(0,255,65,0.03) 0%,
                rgba(0,255,65,0.01) 40%,
                transparent 70%
            );
            animation: glow-pulse 4s ease-in-out infinite alternate;
        }

        @keyframes glow-pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* ===================== TERMINAL ===================== */
        .terminal {
            max-width: 850px;
            margin: 0 auto;
            padding: 30px 25px 130px 25px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 3px rgba(0,255,65,0.15);
        }

        .terminal-line {
            margin-bottom: 2px;
            word-break: break-word;
            animation: line-appear 0.1s ease-out;
        }

        @keyframes line-appear {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===================== COLORS — GREEN + AMBER ===================== */
        .prefix { color: #00ff41; text-shadow: 0 0 6px rgba(0,255,65,0.3); }
        .text { color: #7a7a7a; }
        .ok { color: #00ff41; text-shadow: 0 0 8px rgba(0,255,65,0.4); }
        .warn-text { color: #ffaa00; text-shadow: 0 0 6px rgba(255,170,0,0.3); }
        .error-text { color: #ff4444; text-shadow: 0 0 6px rgba(255,68,68,0.3); }
        .success { color: #00ff41; text-shadow: 0 0 10px rgba(0,255,65,0.5); }
        .brand { color: #00ff41; font-size: 1.3rem; text-shadow: 0 0 12px rgba(0,255,65,0.5); }
        .dim { color: #2a2a2a; }
        .highlight { color: #00ff41; text-shadow: 0 0 8px rgba(0,255,65,0.4); }
        .warn { color: #ff4444; text-shadow: 0 0 6px rgba(255,68,68,0.3); }
        .separator { color: #1a3a1a; text-shadow: none; }

        /* Amber for lore */
        .lore-line { color: #d4a030; text-shadow: 0 0 5px rgba(212,160,48,0.25); }
        .lore-line .highlight { color: #ffcc00; text-shadow: 0 0 8px rgba(255,204,0,0.4); }
        .lore-line .warn { color: #ff4444; text-shadow: 0 0 6px rgba(255,68,68,0.3); }

        /* ===================== TYPEWRITER CURSOR ===================== */
        .tw-cursor {
            display: inline-block;
            width: 9px; height: 1.15em;
            background: #00ff41;
            vertical-align: text-bottom;
            margin-left: 1px;
            animation: cursor-blink 0.6s step-end infinite;
            box-shadow: 0 0 6px rgba(0,255,65,0.5);
        }

        @keyframes cursor-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ===================== INPUT LINE ===================== */
        .input-line {
            display: flex;
            align-items: center;
            margin-top: 6px;
        }

        .input-line .prompt {
            color: #00ff41;
            margin-right: 8px;
            white-space: nowrap;
            text-shadow: 0 0 6px rgba(0,255,65,0.3);
        }

        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: 'VT323', 'Courier New', monospace;
            font-size: 1.15rem;
            outline: none;
            caret-color: #00ff41;
            letter-spacing: 1px;
            text-shadow: 0 0 6px rgba(0,255,65,0.3);
        }

        .terminal-input::placeholder { color: #0e2e0e; text-shadow: none; }
        .terminal-input:disabled { opacity: 0.3; }

        /* ===================== STICKY NOTE ===================== */
        .sticky-note {
            position: fixed; top: 18px; right: 18px;
            width: 180px; padding: 18px 16px 14px 16px;
            background: #f5e960; color: #222;
            font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
            font-size: 0.95rem; line-height: 1.5;
            box-shadow: 3px 5px 18px rgba(0,0,0,0.7);
            transform: rotate(3deg); z-index: 1500;
            border-bottom-right-radius: 30px 8px;
            display: none;
        }
        .sticky-note.show { display: block; animation: note-drop 0.4s ease-out; }
        @keyframes note-drop {
            from { transform: rotate(3deg) translateY(-30px); opacity: 0; }
            to { transform: rotate(3deg) translateY(0); opacity: 1; }
        }
        .sticky-note::before {
            content: ''; position: absolute; top: -6px; left: 50%;
            transform: translateX(-50%); width: 50px; height: 12px;
            background: rgba(200,200,200,0.5); border-radius: 2px;
        }
        .sticky-note .note-title {
            font-weight: bold; font-size: 0.8rem; color: #555;
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;
        }
        .sticky-note .note-pw {
            font-size: 1.3rem; font-weight: bold; color: #1a1a1a;
            margin-top: 4px; letter-spacing: 2px;
        }

        /* ===================== DECRYPT DISPLAY ===================== */
        .decrypt-display {
            font-size: 2rem; letter-spacing: 6px; text-align: center;
            margin: 15px 0; padding: 20px;
            border: 1px solid #0e2e0e; background: rgba(0,10,0,0.5);
            color: #00ff41; font-family: 'VT323', monospace; min-height: 70px;
            display: none; align-items: center; justify-content: center;
            word-break: break-all;
            box-shadow: 0 0 20px rgba(0,255,65,0.05) inset;
        }
        .decrypt-display.active { display: flex; }
        .decrypt-display .char { display: inline-block; min-width: 0.6em; text-align: center; }
        .decrypt-display .char.scrambling { color: #0a8a2a; text-shadow: 0 0 5px rgba(0,255,65,0.25); }
        .decrypt-display .char.resolved {
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41, 0 0 25px rgba(0,255,65,0.4);
            animation: char-lock 0.3s ease-out;
        }
        .decrypt-display .char.dot { color: #00ff41; text-shadow: 0 0 8px rgba(0,255,65,0.3); }
        .decrypt-display .char.bruteforce {
            color: #ff4444;
            text-shadow: 0 0 6px rgba(255,68,68,0.5);
        }
        .decrypt-display .char.trying {
            color: #d4a030;
            text-shadow: 0 0 8px rgba(212,160,48,0.6), 0 0 20px rgba(212,160,48,0.2);
        }
        .decrypt-display .char.decode-flash {
            color: #ffffff;
            text-shadow: 0 0 15px #ffffff, 0 0 30px #00ff41, 0 0 50px rgba(0,255,65,0.5);
            animation: decode-lock 0.5s ease-out;
        }
        @keyframes char-lock {
            0% { transform: scale(1.4); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        @keyframes decode-lock {
            0% { transform: scale(1.6); color: #ffffff; text-shadow: 0 0 20px #ffffff; }
            30% { transform: scale(0.85); }
            60% { transform: scale(1.1); color: #00ff41; }
            100% { transform: scale(1); color: #00ff41; text-shadow: 0 0 10px #00ff41, 0 0 25px rgba(0,255,65,0.4); }
        }

        /* ===================== PROGRESS BAR ===================== */
        .progress-bar {
            width: 100%; height: 3px; background: #0a0a0a;
            margin: 10px 0; border-radius: 2px; overflow: hidden; display: none;
            border: 1px solid #0e2e0e;
        }
        .progress-bar.active { display: block; }
        .progress-bar .fill {
            height: 100%; width: 0%; background: #00ff41;
            box-shadow: 0 0 12px #00ff41, 0 0 25px rgba(0,255,65,0.3);
            transition: width 0.3s;
        }

        /* ===================== FINAL BOX ===================== */
        .final-box {
            text-align: center; margin-top: 20px; padding: 25px;
            border: 1px solid #00ff41; background: rgba(0,255,65,0.02);
            opacity: 0; transition: opacity 1.5s ease-in;
            box-shadow: 0 0 30px rgba(0,255,65,0.05), 0 0 60px rgba(0,255,65,0.02);
        }
        .final-box.visible { opacity: 1; }
        .final-box .ip-text {
            color: #00ff41; font-size: 2rem;
            text-shadow: 0 0 15px rgba(0,255,65,0.7), 0 0 30px rgba(0,255,65,0.3);
            letter-spacing: 4px; margin: 15px 0;
        }

        /* ===================== DECODER OVERLAY APP ===================== */
        .decoder-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'VT323', monospace;
            opacity: 0; transition: opacity 0.4s ease-in;
            overflow: hidden;
        }
        .decoder-overlay.visible { opacity: 1; }
        .decoder-overlay .decoder-titlebar {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 8px 16px;
            background: rgba(0,255,65,0.08);
            border-bottom: 1px solid #0e2e0e;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.9rem;
        }
        .decoder-overlay .decoder-titlebar .title {
            color: #00ff41; letter-spacing: 2px;
        }
        .decoder-overlay .decoder-titlebar .version {
            color: rgba(0,255,65,0.4); font-size: 0.8rem;
        }
        .decoder-overlay .decoder-body {
            display: flex; flex-direction: column; align-items: center;
            gap: 20px; width: 90%; max-width: 700px;
        }
        .decoder-overlay .decoder-label {
            font-size: 1rem; color: rgba(0,255,65,0.6);
            letter-spacing: 3px; text-transform: uppercase;
        }
        .decoder-overlay .decoder-chars {
            font-size: 2.6rem; letter-spacing: 8px; text-align: center;
            padding: 25px 20px;
            border: 1px solid #0e2e0e; background: rgba(0,10,0,0.6);
            color: #00ff41; min-height: 80px; width: 100%;
            display: flex; align-items: center; justify-content: center;
            word-break: break-all;
            box-shadow: 0 0 30px rgba(0,255,65,0.05) inset, 0 0 60px rgba(0,255,65,0.02);
        }
        .decoder-overlay .decoder-chars .char { display: inline-block; min-width: 0.6em; text-align: center; }
        .decoder-overlay .decoder-chars .char.scrambling { color: #0a8a2a; text-shadow: 0 0 5px rgba(0,255,65,0.25); }
        .decoder-overlay .decoder-chars .char.resolved {
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41, 0 0 25px rgba(0,255,65,0.4);
            animation: char-lock 0.3s ease-out;
        }
        .decoder-overlay .decoder-chars .char.dot { color: #00ff41; text-shadow: 0 0 8px rgba(0,255,65,0.3); }
        .decoder-overlay .decoder-chars .char.bruteforce {
            color: #ff4444;
            text-shadow: 0 0 6px rgba(255,68,68,0.5);
        }
        .decoder-overlay .decoder-chars .char.trying {
            color: #d4a030;
            text-shadow: 0 0 8px rgba(212,160,48,0.6), 0 0 20px rgba(212,160,48,0.2);
        }
        .decoder-overlay .decoder-chars .char.decode-flash {
            color: #ffffff;
            text-shadow: 0 0 15px #ffffff, 0 0 30px #00ff41, 0 0 50px rgba(0,255,65,0.5);
            animation: decode-lock 0.5s ease-out;
        }
        .decoder-overlay .decoder-progress {
            width: 100%; height: 4px; background: #0a0a0a;
            border-radius: 2px; overflow: hidden;
            border: 1px solid #0e2e0e;
        }
        .decoder-overlay .decoder-progress .fill {
            height: 100%; width: 0%; background: #00ff41;
            box-shadow: 0 0 12px #00ff41, 0 0 25px rgba(0,255,65,0.3);
            transition: width 0.3s;
        }
        .decoder-overlay .decoder-status {
            font-size: 1rem; color: rgba(0,255,65,0.5);
            letter-spacing: 1px; text-align: center;
            min-height: 1.2em;
        }
        .decoder-overlay .decoder-log {
            width: 100%; max-height: 120px; overflow-y: auto;
            border: 1px solid #0e2e0e; background: rgba(0,5,0,0.4);
            padding: 8px 12px; font-size: 0.85rem;
            color: rgba(0,255,65,0.5);
        }
        .decoder-overlay .decoder-log div {
            margin: 2px 0;
        }
        .decoder-overlay .decoder-log .log-success { color: #00ff41; }
        .decoder-overlay .decoder-log .log-warn { color: #d4a030; }
        .decoder-overlay .decoder-log .log-error { color: #ff4444; }

        /* Overlay-local shake & flash (avoids CRT transform conflicts) */
        @keyframes decoder-shake {
            0%, 100% { transform: translate(0,0); }
            10% { transform: translate(-3px,2px); }
            30% { transform: translate(3px,-2px); }
            50% { transform: translate(-2px,2px); }
            70% { transform: translate(2px,-3px); }
            90% { transform: translate(-3px,1px); }
        }
        .decoder-overlay.dec-shaking .decoder-body {
            animation: decoder-shake 0.2s linear;
        }
        .decoder-overlay .decoder-flash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #00ff41; opacity: 0; pointer-events: none;
            transition: opacity 0.06s;
        }
        .decoder-overlay .decoder-flash-overlay.active { opacity: 0.08; }

        .decoder-overlay .decoder-shift-indicator {
            font-size: 1.3rem; color: #d4a030;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(212,160,48,0.3);
        }
        @media (max-width: 600px) {
            .decoder-overlay .decoder-chars { font-size: 1.5rem; letter-spacing: 4px; padding: 15px 10px; }
            .decoder-overlay .decoder-body { width: 95%; }
        }

        /* ===================== SCREEN FLASH ===================== */
        .screen-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #00ff41; opacity: 0; pointer-events: none; z-index: 1500;
            transition: opacity 0.08s;
        }
        .screen-flash.flash { opacity: 0.12; }

        /* ===================== SHAKE ===================== */
        @keyframes shake-hard {
            0%, 100% { transform: translate(0,0); }
            10% { transform: translate(-4px,2px); }
            20% { transform: translate(4px,-2px); }
            30% { transform: translate(-3px,3px); }
            40% { transform: translate(3px,-3px); }
            50% { transform: translate(-4px,1px); }
            60% { transform: translate(2px,-4px); }
            70% { transform: translate(-2px,3px); }
            80% { transform: translate(4px,-1px); }
            90% { transform: translate(-3px,4px); }
        }
        .shaking { animation: shake-hard 0.15s linear infinite; }

        /* ===================== BREACH ATTACK ===================== */
        .breach-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0);
            z-index: 2000;
            display: none; flex-direction: column;
            font-family: 'VT323', monospace;
            transition: background 1s;
        }
        .breach-overlay.active { display: flex; }
        .breach-overlay.darken { background: rgba(0, 0, 0, 0.85); }

        .breach-header {
            padding: 12px 20px;
            background: rgba(255, 0, 0, 0.12);
            border-bottom: 2px solid rgba(255, 0, 0, 0.4);
            font-size: 1rem;
            color: #ff4444;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            animation: breach-header-blink 0.5s ease-in-out infinite alternate;
            flex-shrink: 0;
        }
        @keyframes breach-header-blink {
            0% { background: rgba(255, 0, 0, 0.12); }
            100% { background: rgba(255, 0, 0, 0.06); }
        }

        .breach-terminal {
            flex: 1; overflow-y: auto;
            padding: 20px 25px;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .breach-terminal .bt-line { margin-bottom: 2px; }
        .breach-terminal .bt-red { color: #ff4444; text-shadow: 0 0 5px rgba(255,0,0,0.3); }
        .breach-terminal .bt-green { color: #00ff41; text-shadow: 0 0 5px rgba(0,255,65,0.3); }
        .breach-terminal .bt-amber { color: #d4a030; text-shadow: 0 0 5px rgba(212,160,48,0.3); }
        .breach-terminal .bt-dim { color: rgba(255,255,255,0.2); }
        .breach-terminal .bt-white { color: #e0e0e0; }

        .breach-input-area {
            padding: 10px 25px 20px;
            border-top: 1px solid rgba(255, 0, 0, 0.2);
            flex-shrink: 0;
            display: flex; gap: 10px; align-items: center;
        }
        .breach-prompt {
            color: #ff4444;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .breach-input {
            flex: 1;
            background: transparent;
            border: none; outline: none;
            color: #ff4444;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            letter-spacing: 1px;
            caret-color: #ff4444;
        }
        .breach-input::placeholder { color: rgba(255,68,68,0.3); }

        .breach-timer {
            position: absolute; top: 12px; right: 20px;
            font-size: 1.4rem;
            color: #ff4444;
            text-shadow: 0 0 10px rgba(255,0,0,0.6);
            letter-spacing: 2px;
        }
        .breach-timer.critical { animation: timer-pulse 0.3s ease-in-out infinite alternate; }
        @keyframes timer-pulse {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.5; transform: scale(1.1); }
        }

        .breach-progress {
            position: absolute; bottom: 60px; left: 25px; right: 25px;
            height: 3px;
            background: rgba(255,0,0,0.1);
        }
        .breach-progress .bp-fill {
            height: 100%;
            width: 0%;
            background: #ff4444;
            box-shadow: 0 0 8px rgba(255,0,0,0.4);
            transition: width 0.3s;
        }
        .breach-progress .bp-fill.safe {
            background: #00ff41;
            box-shadow: 0 0 8px rgba(0,255,65,0.4);
        }

        @keyframes wipe-line {
            0% { opacity: 1; transform: translateX(0); }
            60% { opacity: 0.5; transform: translateX(10px); color: #ff4444; }
            100% { opacity: 0; transform: translateX(-100%); }
        }
        .wipe-out { animation: wipe-line 0.4s ease-in forwards; }

        .breach-cmd-box {
            margin: 12px 0;
            padding: 18px 22px;
            border: 2px solid rgba(255, 68, 68, 0.5);
            background: rgba(255, 0, 0, 0.06);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.08), inset 0 0 15px rgba(255, 0, 0, 0.03);
            text-align: center;
            animation: cmd-box-pulse 1s ease-in-out infinite alternate;
        }
        @keyframes cmd-box-pulse {
            0% { border-color: rgba(255, 68, 68, 0.5); box-shadow: 0 0 20px rgba(255,0,0,0.08); }
            100% { border-color: rgba(255, 68, 68, 0.8); box-shadow: 0 0 35px rgba(255,0,0,0.15); }
        }
        .breach-cmd-label {
            font-size: 0.8rem;
            color: rgba(255, 68, 68, 0.5);
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .breach-cmd-text {
            font-size: 2rem;
            color: #ff4444;
            text-shadow: 0 0 15px rgba(255, 68, 68, 0.6), 0 0 30px rgba(255, 0, 0, 0.2);
            letter-spacing: 6px;
            font-weight: bold;
        }
        .breach-cmd-desc {
            font-size: 0.85rem;
            color: rgba(212, 160, 48, 0.6);
            margin-top: 8px;
            letter-spacing: 2px;
        }
        .breach-cmd-timer-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 0, 0, 0.15);
            margin-top: 12px;
            border-radius: 2px;
            overflow: hidden;
        }
        .breach-cmd-timer-fill {
            height: 100%;
            width: 100%;
            background: #ff4444;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.5);
            transition: width 0.1s linear;
        }
        .breach-cmd-timer-fill.warning {
            background: #d4a030;
            box-shadow: 0 0 8px rgba(212, 160, 48, 0.5);
        }
        .breach-cmd-timer-fill.critical {
            background: #ff2222;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.7);
            animation: timer-bar-pulse 0.3s ease-in-out infinite alternate;
        }
        @keyframes timer-bar-pulse {
            0% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .breach-cmd-box.success .breach-cmd-timer-fill {
            background: #00ff41;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.5);
            animation: none;
        }
        .breach-cmd-box.success {
            border-color: rgba(0, 255, 65, 0.5);
            background: rgba(0, 255, 0, 0.04);
            animation: none;
        }
        .breach-cmd-box.success .breach-cmd-text {
            color: #00ff41;

        // ============================================================
        //  CRYPTO HELPERS
        // ============================================================
        function sha256(str) {
            var enc = new TextEncoder();
            return crypto.subtle.digest('SHA-256', enc.encode(str)).then(function(buf) {
                return Array.from(new Uint8Array(buf)).map(function(b) {
                    return b.toString(16).padStart(2, '0');
                }).join('');
            });
        }

        function decryptTarget(passKey) {
            var key = passKey.toLowerCase();
            var result = '';
            for (var i = 0; i < TARGET_ENC.length; i++) {
                result += String.fromCharCode(TARGET_ENC[i] ^ key.charCodeAt(i % key.length));
            }
            return result;
        }

        function caesarShift(text, shift) {
            return text.split('').map(function(ch) {
                var code = ch.charCodeAt(0);
                if (code >= 65 && code <= 90) return String.fromCharCode(((code - 65 + shift) % 26) + 65);
                if (code >= 97 && code <= 122) return String.fromCharCode(((code - 97 + shift) % 26) + 97);
                return ch;
            }).join('');
        }

        // ============================================================
        //  TYPEWRITER LINE — uses requestAnimationFrame for sync
        // ============================================================
        function typeLine(html, speed, callback) {
            if (skipped) {
                addRaw(html);
                if (callback) callback();
                return;
            }

            var temp = document.createElement('div');
            temp.innerHTML = html;
            var fullText = temp.textContent;

            var div = document.createElement('div');
            div.className = 'terminal-line';
            if (inputLineEl) terminal.insertBefore(div, inputLineEl);
            else terminal.appendChild(div);

            var cursor = document.createElement('span');
            cursor.className = 'tw-cursor';

            var charIndex = 0;
            div.innerHTML = '';
            div.appendChild(cursor);

            var lastCharTime = 0;
            var currentDelay = 0;

            function tick(timestamp) {
                if (skipped) {
                    div.innerHTML = html;
                    if (callback) callback();
                    return;
                }

                if (lastCharTime === 0) lastCharTime = timestamp;

                if (timestamp - lastCharTime < currentDelay) {
                    requestAnimationFrame(tick);
                    return;
                }

                if (charIndex < fullText.length) {
                    var ch = fullText[charIndex];
                    charIndex++;
                    var t = document.createTextNode(ch);
                    div.insertBefore(t, cursor);
                    scrollBottom();

                    if (ch !== ' ' && ch !== '\n') SFX.typeClick();

                    currentDelay = speed;
                    if (ch === ' ') currentDelay = speed * 0.3;
                    else if (ch === '.' || ch === '—') currentDelay = speed * 3;
                    else if (ch === ',') currentDelay = speed * 1.8;

                    lastCharTime = timestamp;
                    requestAnimationFrame(tick);
                } else {
                    div.innerHTML = html;
                    if (callback) callback();
                }
            }

            requestAnimationFrame(tick);
        }

        // ============================================================

                        i++;
                        if (l.fn) l.fn();
                        else addRaw(l.html);
                    }
                    if (callback) callback();
                    return;
                }
                if (i >= lines.length) { if (callback) callback(); return; }
                var l = lines[i];
                i++;
                if (l.fn) {
                    l.fn();
                    setTimeout(next, l.delay || 200);
                } else if (l.type) {
                    typeLine(l.html, l.speed || 20, function() {
                        setTimeout(next, l.delay || 100);
                    });
                } else {
                    addRaw(l.html);
                    setTimeout(next, l.delay || 200);
                }
            }
            next();
        }

        function handleLogin(parts) {

                sha256(user.toLowerCase()),
                sha256(pass.toLowerCase())

                setTimeout(function() {
                    if (hashes[0] === USER_HASH && hashes[1] === PASS_HASH) {

        function initDisplay(displayEl) {

                if (SHIFTED_TARGET[i] === '.' || SHIFTED_TARGET[i] === '-') {
                    span.textContent = SHIFTED_TARGET[i];
                    span.className = 'char dot';
                    span.dataset.resolved = 'true';
                } else {
                    span.className = 'char scrambling';
                    span.textContent = SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
                    span.dataset.resolved = 'false';
                }
                displayEl.appendChild(span);
                decChars.push(span);
            }
            scrambleInterval = setInterval(function() {
                if (Math.random() < 0.3) SFX.scrambleTick();
                decChars.forEach(function(s) {
                    if (s.dataset.resolved === 'false')
                        s.textContent = SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
                });
            }, 70);
        }

        function runDecryption(displayEl, fillEl, progEl) {
            var indices = [];
            for (var i = 0; i < SHIFTED_TARGET.length; i++) {
                if (SHIFTED_TARGET[i] !== '.' && SHIFTED_TARGET[i] !== '-') indices.push(i);
            }
            for (var i = indices.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var t = indices[i]; indices[i] = indices[j]; indices[j] = t;
            }
            var total = indices.length;
            var resolved = 0;

            function next() {
                if (indices.length === 0) {
                    clearInterval(scrambleInterval);
                    finish(progEl); return;
                }
                var idx = indices.shift();
                var span = decChars[idx];
                var fc = 0;
                var fm = 6 + Math.floor(Math.random() * 6);
                var fi = setInterval(function() {
                    span.textContent = SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
                    fc++;
                    if (fc >= fm) {
                        clearInterval(fi);
                        span.textContent = SHIFTED_TARGET[idx];
                        span.className = 'char resolved';
                        span.dataset.resolved = 'true';
                        SFX.charLock();
                        resolved++;
                        fillEl.style.width = ((resolved / total) * 100) + '%';
                        var pct = Math.round((resolved / total) * 100);
                        if (pct === 25) { addLine('DECRYPT', 'Erste Datenschicht... 25%', 'text'); shake(); }
                        else if (pct === 50) { addLine('DECRYPT', 'Fragmentrekonstruktion... 50%', 'warn-text'); shake(); }
                        else if (pct === 75) { SFX.warn(); addLine('SYSTEM', 'WARNUNG: Instabile Verbindung!', 'error-text'); shake(); }
                        scrollBottom();
                        setTimeout(next, 150 + Math.random() * 250);
                    }
                }, 45);
            }
            setTimeout(next, 500);
        }

            bInput.disabled = true;

            setTimeout(function() {
                bLog('[DEFENSE] Notfall-Verteidigungsprotokoll geladen', 'bt-amber');
                bLog('[DEFENSE] Starte Bedrohungsanalyse...', 'bt-amber');
                bLog('', '');

                    { threat: 'Offene Ports erkannt — Firewall inaktiv', response: 'FIREWALL ACTIVATE', delay: 1200 },
                    { threat: 'Feindlicher Prozess PID 6661 aktiv', response: 'KILL 6661', delay: 1000 },

                    { threat: 'Eindringling im System — Root-Zugriff', response: 'PURGE INTRUDER', delay: 1000 }
                ];

                var ti = 0;
                function showNextThreat() {
                    if (ti >= threats.length) {
                        setTimeout(function() {
                            bLog('', '');
                            SFX.scan();
                            bLog('[DEFENSE] Analyse abgeschlossen — 4 Bedrohungen identifiziert', 'bt-amber');
                            bLog('[DEFENSE] TIPPE DIE BEFEHLE EXAKT WIE ANGEZEIGT', 'bt-amber');
                            bLog('[DEFENSE] Fehler kosten Zeit — Zeitlimit pro Befehl aktiv', 'bt-amber');
                            bLog('', '');
                            setTimeout(function() {
                                bLog('[DEFENSE] ═══════════════════════════════════════════', 'bt-amber');

                                bLog('[DEFENSE] ═══════════════════════════════════════════', 'bt-amber');

                                bInput.placeholder = 'Befehl eingeben...';

                        }, 800);

                    }

                    var t = threats[ti];
                    ti++;
                    SFX.scrambleTick();
                    bLog('[SCAN] Bedrohung #' + ti + ': ' + t.threat, 'bt-red');
                    setTimeout(function() {
                        bLogHtml('[SCAN] Gegenmaßnahme: <span style="color:#00ff41;text-shadow:0 0 8px rgba(0,255,65,0.4);letter-spacing:2px;">' + t.response + '</span>', 'bt-green');

                        setTimeout(showNextThreat, t.delay);
                    }, 500);
                }

                setTimeout(showNextThreat, 800);

            var attackNoiseInterval = setInterval(function() {
                if (breachWon || breachLost) { clearInterval(attackNoiseInterval); return; }

            function promptNextCommand() {
                if (cmdIndex >= commands.length) {
                    breachWon = true;
                    breachVictory(overlay, term);

                var cmd = commands[cmdIndex];
                bLog('', '');
                bLog('[DEFENSE] >> Aktion erforderlich: ' + cmd.desc, 'bt-amber');
                BreachSFX.alarm();

                // Show prominent command box
                cmdBox.style.display = '';
                cmdBox.className = 'breach-cmd-box';
                cmdText.textContent = cmd.hint;
                cmdDesc.textContent = '[ ' + cmd.desc.toUpperCase() + ' ]';

                bInput.value = '';
                bInput.placeholder = cmd.hint;
                bInput.focus();
                bFill.style.width = ((cmdIndex / commands.length) * 100) + '%';

                timeLeft = cmd.timeLimit;
                timerEl.textContent = (timeLeft / 1000).toFixed(1);
                timerEl.classList.remove('critical');
                cmdTimerFill.style.width = '100%';
                cmdTimerFill.className = 'breach-cmd-timer-fill';

                clearInterval(timerInterval);
                timerInterval = setInterval(function() {
                    timeLeft -= 100;
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        cmdTimerFill.style.width = '0%';
                        breachLost = true;
                        bLog('[SYSTEM] ZEIT ABGELAUFEN', 'bt-red');
                        breachDefeat(overlay, term);
                        return;
                    }
                    timerEl.textContent = (timeLeft / 1000).toFixed(1);
                    var pct = (timeLeft / cmd.timeLimit) * 100;
                    cmdTimerFill.style.width = pct + '%';
                    if (timeLeft <= 2000) {
                        timerEl.classList.add('critical');
                        cmdTimerFill.className = 'breach-cmd-timer-fill critical';
                    } else if (timeLeft <= 4000) {
                        cmdTimerFill.className = 'breach-cmd-timer-fill warning';
                    }
                }, 100);
            }

            bInput.addEventListener('keydown', function(e) {
                if (e.key.length === 1) SFX.keyPress();
                if (e.key === 'Enter') {
                    if (breachWon || breachLost) return;
                    var val = bInput.value.trim().toUpperCase();
                    bInput.value = '';
                    if (!val) return;

                    bLog('root@DEFENSE:~# ' + val, 'bt-white');

                    if (val === commands[cmdIndex].cmd) {
                        clearInterval(timerInterval);
                        BreachSFX.cmdSuccess();
                        bLog('[OK] ' + commands[cmdIndex].desc + ' — ERFOLGREICH', 'bt-green');
                        cmdBox.classList.add('success');
                        cmdIndex++;
                        bFill.classList.add('safe');
                        bFill.style.width = ((cmdIndex / commands.length) * 100) + '%';
                        setTimeout(function() {
                            bFill.classList.remove('safe');
                            promptNextCommand();
                        }, 600);
                    } else {
                        BreachSFX.cmdFail();
                        bLog('[FEHLER] Unbekannter Befehl — versuche es erneut!', 'bt-red');
                        timeLeft -= 1500;
                        if (timeLeft <= 0) {
                            clearInterval(timerInterval);
                            breachLost = true;
                            bLog('[SYSTEM] ZEIT ABGELAUFEN', 'bt-red');
                            breachDefeat(overlay, term);
                        }
                    }
                }
            });
        }
